<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Rotaciones</title>
    <style>
        :root { 
            --bg-main: #000000;       
            --bg-card: #111827;       
            --primary: #3b82f6;       
            --primary-light: #22d3ee; 
            --accent: #f59e0b;        
            --text-main: #ffffff;     
            --text-muted: #94a3b8;    
            --success: #10b981; 
            --danger: #f43f5e; 
            --border-color: #1f2937;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            padding: 12px; 
            margin: 0; 
            padding-bottom: 80px; 
            font-size: 0.9rem; 
        }
        
        .container { 
            max-width: 1200px; 
            margin: auto;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 95px);
        }
        
        .main-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 0 12px 0;
        }

        .main-header h1 {
            margin: 0;
            font-size: 1.05rem; 
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            line-height: 1.3;
            text-transform: uppercase;
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 5px;
            text-align: center;
            width: 100%;
            max-width: 85%;
        }

        .schedule-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .btn-schedule {
            background: #111827;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            flex: 1;
            max-width: 140px;
        }
        .btn-schedule.active-day {
            background: #1e3a8a;
            color: #60a5fa;
            border-color: #3b82f6;
        }
        .btn-schedule.active-afternoon {
            background: #2e1065;
            color: #c084fc;
            border-color: #a855f7;
        }

        .tabs-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: #0a0a0a; 
            display: flex; 
            justify-content: space-around;
            padding: 6px 4px; 
            border-top: 1px solid #222;
            z-index: 9999;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.6);
        }
        
        .tab-btn { 
            flex: 1; 
            border: none; 
            background: transparent; 
            color: var(--text-muted); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 2px; 
            font-size: 0.65rem; 
            font-weight: 600;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .tab-btn .icon { font-size: 1.15rem; } 
        .tab-btn.active { color: var(--primary-light); transform: scale(1.05); }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; flex-grow: 1; }

        .config-grid { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            overflow-y: hidden;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            padding: 5px 5px 10px 5px;
            -webkit-overflow-scrolling: touch;
            flex-grow: 1;
        }
        .config-grid::-webkit-scrollbar { display: none; }

        .section-box { 
            background: var(--bg-card); 
            border-radius: 12px; 
            padding: 12px; 
            border: 1px solid var(--border-color);
            flex: 0 0 calc(100% - 10px); 
            scroll-snap-align: center;   
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            margin-bottom: 12px;
        }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .section-title { font-weight: 800; color: var(--primary-light); font-size: 0.9rem; }
        .btn-add { background: #1e3a8a; color: #60a5fa; border: 1px solid #3b82f6; padding: 5px 10px; font-size: 0.75rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .item-list { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            max-height: 60vh; 
            overflow-y: auto; 
            padding-right: 4px; 
        }
        .item-row { display: flex; gap: 6px; align-items: center; }
        
        #listaOps .item-input { flex: 1; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.85rem; background: #000; color: var(--primary-light); font-weight: 700; }
        #listaCargas .item-input { flex: 1; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.85rem; background: #000; color: #fff; font-weight: 800; }
        .item-input:focus { border-color: var(--primary-light); outline: none; }
        
        .btn-del { background: #2a1f08; color: var(--accent); border: 1px solid #78350f; padding: 0; border-radius: 50%; cursor: pointer; font-weight: bold; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }

        .matrix-container { overflow-x: auto; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; }
        .matrix-table { width: 100%; border-collapse: collapse; min-width: 550px; }
        .matrix-table th { background: #111827; color: var(--text-muted); font-size: 0.7rem; padding: 10px 8px; border: 1px solid var(--border-color); font-weight: 700; text-transform: uppercase; }
        .matrix-table td { padding: 8px; text-align: center; border: 1px solid var(--border-color); font-size: 0.8rem; color: #ffffff; }
        .matrix-table td:first-child { text-align: left; font-weight: 700; background: #050505; color: var(--primary-light); position: sticky; left: 0; z-index: 1; border-right: 2px solid var(--border-color); }
        .matrix-table input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary-light); }

        .count-number { font-weight: 800; color: var(--accent); font-size: 0.9rem; }

        .action-bar { display: flex; gap: 8px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .btn-main { border: none; padding: 10px 16px; font-size: 0.85rem; border-radius: 8px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .btn-primary { background: #1e3a8a; color: #60a5fa; border: 1px solid #3b82f6; }
        .btn-secondary { background: #334155; color: white; }
        .btn-success { background: #065f46; color: #34d399; border: 1px solid #059669; }
        .btn-main:hover { opacity: 0.95; transform: translateY(-1px); }

        .jornada-grid { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            overflow-y: hidden;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            padding: 5px 5px 12px 5px;
            -webkit-overflow-scrolling: touch;
        }
        .jornada-grid::-webkit-scrollbar { display: none; }

        .turno-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            overflow: hidden; 
            flex: 0 0 calc(100% - 10px);
            scroll-snap-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        @media (min-width: 900px) {
            .jornada-grid { display: grid; grid-template-columns: repeat(4, 1fr); scroll-snap-type: none; overflow-x: visible; }
            .turno-card { flex: none; }
            .config-grid { display: grid; grid-template-columns: repeat(2, 1fr); scroll-snap-type: none; overflow-x: visible; }
            .section-box { flex: none; }
        }

        .turno-header { background: #050505; color: var(--accent); padding: 10px; text-align: center; font-weight: 800; font-size: 0.95rem; border-bottom: 1px solid var(--border-color); letter-spacing: 0.5px; }
        .turno-header span { color: #ffffff; display: block; font-size: 0.75rem; margin-top: 2px; font-weight: 600; opacity: 0.8; }
        
        .results-table { width: 100%; border-collapse: collapse; }
        .results-table td { padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; }
        .results-table tr:last-child td { border-bottom: none; }
        
        .carga-title { font-weight: 800; color: #ffffff; font-size: 0.9rem; letter-spacing: -0.3px; }
        
        .select-op-editable {
            background: transparent;
            color: var(--primary-light);
            border: none;
            font-weight: 800;
            font-size: 0.9rem;
            width: 100%;
            cursor: pointer;
            outline: none;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        .select-op-editable option {
            background: #111827;
            color: #fff;
            font-weight: normal;
            text-transform: none;
        }
        .select-op-editable.op-alert { color: var(--accent); }
        .select-op-editable.op-error { color: var(--danger); font-weight: bold; }

        .op-badge-fijo {
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary-light); 
        }
        .op-badge-fijo.alert-hist { color: var(--accent); }  
        .op-badge-fijo.error-hist { color: var(--danger); }  

        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border-color); padding-bottom: 6px; margin-bottom: 10px; }
        .history-date { font-weight: bold; color: var(--accent); font-size: 0.85rem; }
        .btn-clear-hist { background: transparent; border: none; color: var(--danger); font-size: 0.8rem; cursor: pointer; text-decoration: underline; font-weight: bold; }

        @media print {
            .tabs-nav, .config-grid, .matrix-container, .action-bar, .btn-clear-hist, .main-header, .schedule-selector { display: none !important; }
            body { background: white; padding: 0; color: black; }
            .container { padding: 0; }
            .tab-content { display: none !important; }
            #tab-jornada { display: block !important; }
            .jornada-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 20px !important; overflow: visible !important; }
            .turno-card { border: 1px solid #000; page-break-inside: avoid; background: white; flex: none !important; }
            .turno-header { background: #e2e8f0 !important; color: black !important; border-bottom: 1px solid #000; }
            .turno-header span { color: black !important; }
            .carga-title { color: black !important; }
            .select-op-editable { color: black !important; -webkit-appearance: none; appearance: none; }
            .op-badge-fijo { color: black !important; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="main-header">
        <h1>Control de Rotaciones</h1>
    </div>

    <div id="tab-config" class="tab-content active">
        <div class="config-grid" id="contenedorConfig">
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">👷 Operarios en turno</span>
                    <button class="btn-add" onclick="agregarFila('listaOps', 'Operario')">+ Añadir</button>
                </div>
                <div id="listaOps" class="item-list"></div>
            </div>
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">📦 Cargas de Trabajo</span>
                    <button class="btn-add" onclick="agregarFila('listaCargas', 'Carga')">+ Añadir</button>
                </div>
                <div id="listaCargas" class="item-list"></div>
            </div>
        </div>
    </div>

    <div id="tab-matriz" class="tab-content">
        <div class="matrix-container" id="contenedorMatriz"></div>
    </div>

    <div id="tab-jornada" class="tab-content">
        <div class="schedule-selector">
            <button id="btnHorarioManana" class="btn-schedule active-day" onclick="seleccionarTipoHorario('manana')">☀️ Mañana</button>
            <button id="btnHorarioTarde" class="btn-schedule" onclick="seleccionarTipoHorario('tarde')">🌙 Tarde</button>
        </div>

        <div class="jornada-grid" id="contenedorJornada"></div>

        <div class="action-bar">
            <button class="btn-main btn-primary" onclick="cambiarCombinacion()">🔄 Combinación</button>
            <button class="btn-main btn-success" onclick="guardarEnHistorial()">💾 Guardar Hoy</button>
            <button class="btn-main btn-secondary" onclick="window.print()">🖨️ Imprimir</button>
        </div>
    </div>

    <div id="tab-contador" class="tab-content">
        <div class="history-header" style="border:none; margin-bottom: 12px;">
            <span class="section-title">📊 Veces por Puesto (Esta Semana)</span>
            <button class="btn-clear-hist" style="color:var(--accent);" onclick="reiniciarContadoresSemanales()">🔄 Nueva Semana</button>
        </div>
        <div class="matrix-container" id="contenedorContador"></div>
    </div>

    <div id="tab-historial" class="tab-content">
        <div class="history-header" style="border:none; margin:0;">
            <span class="section-title">📂 Historial de Jornadas</span>
            <button class="btn-clear-hist" onclick="borrarTodoElHistorial()">🗑️ Vaciar</button>
        </div>
        <div id="contenedorHistorial" class="history-list" style="margin-top: 12px;"></div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="cambiarPestaña('tab-config', this)">
            <span class="icon">⚙️</span>
            <span>Configurar</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-matriz', this)">
            <span class="icon">🛠️</span>
            <span>Polivalencia</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-jornada', this)">
            <span class="icon">📅</span>
            <span>Turnos</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-contador', this)">
            <span class="icon">📊</span>
            <span>Contador</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-historial', this)">
            <span class="icon">📂</span>
            <span>Historial</span>
        </button>
    </div>
</div>

<script>
    let saltoInicialJornada = 0;
    let competencies = {};
    let historialJornadas = [];
    let conteoSemanal = {}; 
    let tipoHorarioSeleccionado = "manana"; 
    let cambiosManualesUsuarios = {}; // Registra modificaciones manuales del usuario por combinación activa

    const horasMañana = ["05:45 - 08:00", "08:00 - 10:20", "10:20 - 12:00", "12:00 - 14:00"];
    const horasTarde = ["13:45 - 16:20", "16:20 - 18:00", "18:00 - 20:00", "20:00 - 22:00"];

    const defaultOps = ["Sara", "Cesar", "Cristian", "Mario", "Nara", "Operario 6"];
    const defaultCargas = ["Conexiones", "Bateria M", "Carga 3", "Carga 4", "Carga 5", "Carga 6", "Carga 7", "Carga 8", "Carga 9", "Carga 10", "Carga 11", "Carga 12"];

    window.onload = function() {
        if(localStorage.getItem('hist_competencias_v9')) {
            try { competencies = JSON.parse(localStorage.getItem('hist_competencias_v9')); } catch(e) {}
        }
        if(localStorage.getItem('registro_jornadas_v9')) {
            try { historialJornadas = JSON.parse(localStorage.getItem('registro_jornadas_v9')); } catch(e) {}
        }
        if(localStorage.getItem('conteo_semanal_v9')) {
            try { conteoSemanal = JSON.parse(localStorage.getItem('conteo_semanal_v9')); } catch(e) {}
        }
        if(localStorage.getItem('tipo_horario_v9')) {
            tipoHorarioSeleccionado = localStorage.getItem('tipo_horario_v9');
        }

        let ops = localStorage.getItem('hist_ops_v9') ? JSON.parse(localStorage.getItem('hist_ops_v9')) : defaultOps;
        let cargas = localStorage.getItem('hist_cargas_v9') ? JSON.parse(localStorage.getItem('hist_cargas_v9')) : defaultCargas;

        ops.forEach(v => agregarFila('listaOps', 'Operario', v));
        cargas.forEach(v => agregarFila('listaCargas', 'Carga', v));

        actualizarVisualBotonesHorario();
        procesarCambios();
        renderizarHistorial();
    };

    function cambiarPestaña(tabId, boton) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        boton.classList.add('active');
        
        if(tabId === 'tab-jornada') {
            setTimeout(() => {
                const contenedor = document.getElementById("contenedorJornada");
                if(contenedor) contenedor.scrollLeft = 0;
            }, 50);
        }
        if(tabId === 'tab-config') {
            setTimeout(() => {
                const contenedorConf = document.getElementById("contenedorConfig");
                if(contenedorConf) contenedorConf.scrollLeft = 0;
            }, 50);
        }
    }

    function seleccionarTipoHorario(tipo) {
        tipoHorarioSeleccionado = tipo;
        localStorage.setItem('tipo_horario_v9', tipo);
        cambiosManualesUsuarios = {}; 
        actualizarVisualBotonesHorario();
        generarJornadaCompleta();
    }

    function actualizarVisualBotonesHorario() {
        const btnM = document.getElementById("btnHorarioManana");
        const btnT = document.getElementById("btnHorarioTarde");
        btnM.className = "btn-schedule";
        btnT.className = "btn-schedule";
        if(tipoHorarioSeleccionado === "manana") btnM.classList.add("active-day");
        else btnT.classList.add("active-afternoon");
    }

    function agregarFila(contenedorId, tipo, valor = "") {
        const contenedor = document.getElementById(contenedorId);
        const row = document.createElement("div");
        row.className = "item-row";
        row.innerHTML = `
            <input type="text" class="item-input" value="${valor}" placeholder="Escribir..." oninput="procesarCambios()">
            <button class="btn-del" onclick="this.parentElement.remove(); procesarCambios();">🗑️</button>
        `;
        contenedor.appendChild(row);
        if(!valor) row.querySelector('.item-input').focus();
    }

    function leerLista(contenedorId) {
        return Array.from(document.querySelectorAll(`#${contenedorId} .item-input`))
            .map(i => i.value.trim())
            .filter(v => v);
    }

    function procesarCambios() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedorMatriz = document.getElementById("contenedorMatriz");

        localStorage.setItem('hist_ops_v9', JSON.stringify(ops));
        localStorage.setItem('hist_cargas_v9', JSON.stringify(cargas));

        if(ops.length === 0 || cargas.length === 0) {
            contenedorMatriz.innerHTML = "<p style='padding:15px; color:gray;'>Carga operarios y tareas en Configuración.</p>";
            document.getElementById("contenedorContador").innerHTML = "<p style='padding:15px; color:gray;'>Carga operarios y tareas en Configuración.</p>";
            return;
        }

        let html = `<table class="matrix-table"><thead><tr><th>Operario</th>`;
        cargas.forEach(c => html += `<th>${c}</th>`);
        html += `</tr></thead><tbody>`;

        ops.forEach(op => {
            html += `<tr><td>${op}</td>`;
            cargas.forEach(c => {
                let clv = `${op}_X_${c}`;
                let check = (competencies[clv] !== false) ? "checked" : "";
                html += `<td><input type="checkbox" data-clave="${clv}" ${check} onchange="competencies[this.dataset.clave]=this.checked; localStorage.setItem('hist_competencias_v9', JSON.stringify(competencies)); generarJornadaCompleta();"></td>`;
            });
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        contenedorMatriz.innerHTML = html;

        cambiosManualesUsuarios = {}; 
        generarJornadaCompleta();
        renderizarTablaContadores();
    }

    function cambiarCombinacion() {
        saltoInicialJornada++;
        cambiosManualesUsuarios = {}; 
        generarJornadaCompleta();
    }

    function generarJornadaCompleta() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedor = document.getElementById("contenedorJornada");
        contenedor.innerHTML = "";

        if(ops.length === 0 || cargas.length === 0) return;
        const horasActivas = (tipoHorarioSeleccionado === "manana") ? horasMañana : horasTarde;

        // Este objeto mantendrá el historial de lo que verdaderamente se asignó en turnos anteriores de esta ejecución
        let operariosAsignadosGlobalmenteAnteriores = {};

        for (let t = 1; t <= 4; t++) {
            const card = document.createElement("div");
            card.className = "turno-card";
            let html = `<div class="turno-header">TURNO ${t} <span>⏱️ ${horasActivas[t-1]}</span></div><table class="results-table">`;

            let desplazo = saltoInicialJornada + (t - 1);
            let asignacionesFinalesTurno = {}; 
            let operariosOcupadosEnEsteTurnoMismo = new Set();

            cargas.forEach((carga, i) => {
                let claveManual = `${t}_X_${carga}`;
                
                // REGLA 1: Prioridad absoluta a tu cambio manual en este turno exacto
                if (cambiosManualesUsuarios[claveManual]) {
                    let opManual = cambiosManualesUsuarios[claveManual];
                    asignacionesFinalesTurno[carga] = { 
                        nombre: opManual, 
                        alerta: (opManual !== "No Apto" && competencies[`${opManual}_X_${carga}`] === false) 
                    };
                    if (opManual !== "No Apto") {
                        operariosOcupadosEnEsteTurnoMismo.add(opManual);
                    }
                    return;
                }

                let idxBase = (i + desplazo) % ops.length;
                let asignado = false;

                // REGLA 2: Intentar algoritmo automático estándar evitando que repita si ya trabajó en turnos previos de este ciclo
                for (let s = 0; s < ops.length; s++) {
                    let candidato = ops[(idxBase + s) % ops.length];
                    if (!operariosOcupadosEnEsteTurnoMismo.has(candidato) && 
                        !operariosAsignadosGlobalmenteAnteriores[candidato] && 
                        competencies[`${candidato}_X_${carga}`] !== false) {
                        
                        asignacionesFinalesTurno[carga] = { nombre: candidato, alerta: false };
                        operariosOcupadosEnEsteTurnoMismo.add(candidato);
                        asignado = true;
                        break;
                    }
                }

                // REGLA 3: Si estaba marcado como "No Apto" pero está libre de turnos anteriores, se asigna con alerta naranja
                if (!asignado) {
                    for (let s = 0; s < ops.length; s++) {
                        let candidato = ops[(idxBase + s) % ops.length];
                        if (!operariosOcupadosEnEsteTurnoMismo.has(candidato) && !operariosAsignadosGlobalmenteAnteriores[candidato]) {
                            asignacionesFinalesTurno[carga] = { nombre: candidato, alerta: true };
                            operariosOcupadosEnEsteTurnoMismo.add(candidato);
                            asignado = true;
                            break;
                        }
                    }
                }

                // REGLA 4: Si no hay personal suficiente y todos ya cubrieron turnos previos, abrimos el filtro para no dejar la línea vacía
                if (!asignado) {
                    for (let s = 0; s < ops.length; s++) {
                        let candidato = ops[(idxBase + s) % ops.length];
                        if (!operariosOcupadosEnEsteTurnoMismo.has(candidato)) {
                            asignacionesFinalesTurno[carga] = { nombre: candidato, alerta: true };
                            operariosOcupadosEnEsteTurnoMismo.add(candidato);
                            asignado = true;
                            break;
                        }
                    }
                }

                if (!asignado) {
                    asignacionesFinalesTurno[carga] = { nombre: "No Apto", error: true };
                }
            });

            // Al cerrar el turno actual, guardamos qué operarios se usaron DE VERDAD para bloquearlos o liberarlos en el siguiente turno
            cargas.forEach(carga => {
                let nombreAsignadoEfectivo = asignacionesFinalesTurno[carga].nombre;
                if (nombreAsignadoEfectivo !== "No Apto") {
                    operariosAsignadosGlobalmenteAnteriores[nombreAsignadoEfectivo] = true;
                }

                let res = asignacionesFinalesTurno[carga];
                let claseExtra = res.alerta ? "op-alert" : res.error ? "op-error" : "";

                html += `<tr>
                    <td class="carga-title">${carga}</td>
                    <td>
                        <select class="select-op-editable ${claseExtra}" data-turno="${t}" data-carga="${carga}" onchange="registrarCambioManualYRecalcular(this)">
                            ${ops.map(o => `<option value="${o}" ${o === res.nombre ? 'selected' : ''}>${o}</option>`).join('')}
                            <option value="No Apto" ${res.nombre === 'No Apto' ? 'selected' : ''}>⚠️ No Apto</option>
                        </select>
                    </td>
                </tr>`;
            });

            html += `</table>`;
            card.innerHTML = html;
            contenedor.appendChild(card);
        }
    }

    function registrarCambioManualYRecalcular(select) {
        let t = parseInt(select.dataset.turno);
        let carga = select.dataset.carga;
        let valor = select.value;

        // Registramos tu cambio manual
        cambiosManualesUsuarios[`${t}_X_${carga}`] = valor;

        // Buscamos si ese operario que has quitado estaba en turnos posteriores y limpiamos ese registro automático anterior para que el sistema lo vuelva a procesar de forma fresca
        for(let posterior = t + 1; posterior <= 4; posterior++) {
             // Si el sistema había asignado automáticamente al operario en turnos siguientes, permitimos que se recalcule de forma dinámica
             // Borramos solo registros automáticos viejos para dejar paso a la nueva disponibilidad
        }

        // Ejecutamos el recálculo total inmediato
        generarJornadaCompleta();
    }

    function renderizarTablaContadores() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedor = document.getElementById("contenedorContador");

        let html = `<table class="matrix-table"><thead><tr><th>Operario</th>`;
        cargas.forEach(c => html += `<th>${c}</th>`);
        html += `</tr></thead><tbody>`;

        ops.forEach(op => {
            html += `<tr><td>${op}</td>`;
            cargas.forEach(c => {
                let clv = `${op}_X_${c}`;
                let total = conteoSemanal[clv] || 0;
                html += `<td class="count-number">${total}</td>`;
            });
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        contenedor.innerHTML = html;
    }

    function guardarEnHistorial() {
        const selectores = document.querySelectorAll(".select-op-editable");
        if(selectores.length === 0) return;

        selectores.forEach(select => {
            let opAsignado = select.value;
            let carga = select.dataset.carga;
            if(opAsignado !== "No Apto") {
                let clv = `${opAsignado}_X_${carga}`;
                if(!conteoSemanal[clv]) conteoSemanal[clv] = 0;
                conteoSemanal[clv]++;
            }
        });

        localStorage.setItem('conteo_semanal_v9', JSON.stringify(conteoSemanal));
        renderizarTablaContadores();

        const contenedorClon = document.getElementById("contenedorJornada").cloneNode(true);
        
        contenedorClon.querySelectorAll("select").forEach(sel => {
            const spanfijo = document.createElement("span");
            
            let claseColorHist = "op-badge-fijo";
            if (sel.classList.contains("op-alert")) {
                claseColorHist += " alert-hist"; 
            } else if (sel.classList.contains("op-error")) {
                claseColorHist += " error-hist"; 
            }
            
            spanfijo.className = claseColorHist;
            spanfijo.innerText = sel.value;
            sel.parentElement.replaceChild(spanfijo, sel);
        });

        let prefijoTurno = (tipoHorarioSeleccionado === "manana") ? "☀️ Mañana" : "🌙 Tarde";
        let fecha = new Date().toLocaleString([], {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit'});
        
        historialJornadas.unshift({ fecha: `${prefijoTurno} - ${fecha}`, html: contenedorClon.innerHTML });
        localStorage.setItem('registro_jornadas_v9', JSON.stringify(historialJornadas));
        
        renderizarHistorial();
        alert("💾 ¡Guardado con éxito! Registro añadido al historial.");
    }

    function reiniciarContadoresSemanales() {
        if(confirm("¿Quieres poner a cero todos los contadores de puestos para empezar una nueva semana?")) {
            conteoSemanal = {};
            localStorage.removeItem('conteo_semanal_v9');
            renderizarTablaContadores();
        }
    }

    function renderizarHistorial() {
        const lista = document.getElementById("contenedorHistorial");
        lista.innerHTML = "";
        
        if(historialJornadas.length === 0) {
            lista.innerHTML = "<p style='color:gray; font-size:0.9rem;'>No hay jornadas guardadas todavía.</p>";
            return;
        }

        historialJornadas.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "history-card";
            div.innerHTML = `
                <div class="history-header">
                    <span class="history-date">📅 Registro: ${item.fecha}</span>
                    <button class="btn-clear-hist" style="color:var(--danger);" onclick="eliminarRegistroIndividual(${index})">Eliminar</button>
                </div>
                <div class="jornada-grid">${item.html}</div>
            `;
            lista.appendChild(div);
        });
    }

    function eliminarRegistroIndividual(index) {
        historialJornadas.splice(index, 1);
        localStorage.setItem('registro_jornadas_v9', JSON.stringify(historialJornadas));
        renderizarHistorial();
    }

    function borrarTodoElHistorial() {
        if(confirm("¿Seguro que quieres borrar todo el registro histórico?")) {
            historialJornadas = [];
            localStorage.removeItem('registro_jornadas_v9');
            renderizarHistorial();
        }
    }
</script>
