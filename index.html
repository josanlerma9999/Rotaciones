<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Rotaciones - Interfaz Táctil</title>
    <style>
        :root { 
            --bg-main: #000000;       
            --bg-card: #111827;       
            --primary: #3b82f6;       
            --primary-light: #22d3ee; 
            --accent: #f59e0b;        
            --text-main: #ffffff;     
            --text-muted: #94a3b8;    
            --success: #10b981; 
            --danger: #f43f5e; 
            --border-color: #1f2937;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            padding: 12px; 
            margin: 0; 
            padding-bottom: 85px; 
            font-size: 0.9rem; 
        }
        
        .container { 
            max-width: 1200px; 
            margin: auto;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 100px);
        }
        
        .main-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 0 12px 0;
        }

        .main-header h1 {
            margin: 0;
            font-size: 1.05rem; 
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 5px;
            text-align: center;
            width: 100%;
        }

        /* CONFIGURACIÓN COMPACTA */
        #tab-config .section-title { font-size: 0.8rem !important; font-weight: 700; }
        #tab-config .btn-add { padding: 4px 8px !important; font-size: 0.7rem !important; border-radius: 5px; }
        #tab-config .item-input { padding: 6px 10px !important; font-size: 0.78rem !important; border-radius: 6px; }
        #tab-config .btn-del { width: 28px !important; height: 28px !important; font-size: 0.75rem !important; }

        .schedule-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .btn-schedule {
            background: #111827;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            flex: 1;
            max-width: 140px;
        }
        .btn-schedule.active-day { background: #1e3a8a; color: #60a5fa; border-color: #3b82f6; }
        .btn-schedule.active-afternoon { background: #2e1065; color: #c084fc; border-color: #a855f7; }

        .tabs-nav { 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            background: #0a0a0a; 
            display: flex; 
            justify-content: space-around;
            padding: 6px 4px; 
            border-top: 1px solid #222;
            z-index: 9999;
        }
        
        .tab-btn { 
            flex: 1; border: none; background: transparent; color: var(--text-muted); 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; 
            gap: 2px; font-size: 0.65rem; font-weight: 600;
        }
        .tab-btn .icon { font-size: 1.15rem; } 
        .tab-btn.active { color: var(--primary-light); }

        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: flex !important; flex-direction: column; flex-grow: 1; }

        /* SCROLL HORIZONTAL CONFIGURAR */
        .config-grid { 
            display: flex; gap: 12px; overflow-x: auto; overflow-y: hidden; 
            scroll-snap-type: x mandatory; padding: 5px 5px 15px 5px;
            flex-grow: 1; touch-action: pan-x; -webkit-overflow-scrolling: touch;
        }
        .config-grid::-webkit-scrollbar { display: none; }

        .section-box { 
            background: var(--bg-card); border-radius: 12px; padding: 14px; border: 1px solid var(--border-color);
            flex: 0 0 calc(100% - 10px); scroll-snap-align: center; display: flex; flex-direction: column;
        }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .btn-add { background: #1e3a8a; color: #60a5fa; border: 1px solid #3b82f6; cursor: pointer; font-weight: bold; }
        
        .item-list { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; overflow-y: auto; max-height: calc(100vh - 270px); }
        .item-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        
        .item-input { flex: 1; border: 1px solid var(--border-color); background: #000; color: #fff; }
        #listaOps .item-input { color: var(--primary-light); font-weight: 700; }
        
        .btn-del { background: #2a1f08; color: var(--accent); border: 1px solid #78350f; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* TABLAS POLIVALENCIA Y CONTADORES */
        .matrix-container { 
            overflow-x: auto; 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            width: 100%; 
        }
        .matrix-table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 500px; 
            table-layout: auto; 
        }
        .matrix-table th { 
            background: #111827; 
            color: var(--text-muted); 
            font-size: 0.75rem; 
            padding: 10px 12px; 
            border: 1px solid var(--border-color); 
            font-weight: 800; 
            text-transform: uppercase; 
            text-align: center;
            min-width: 100px; 
            word-break: normal;
        }
        .matrix-table th:first-child,
        .matrix-table td:first-child {
            min-width: 110px; 
            text-align: left; 
            font-weight: 700; 
            background: #050505; 
            color: var(--primary-light); 
            position: sticky; 
            left: 0; 
            z-index: 1; 
            border-right: 2px solid var(--border-color);
        }
        .matrix-table td { 
            padding: 10px 12px; 
            text-align: center; 
            border: 1px solid var(--border-color); 
            font-size: 0.8rem; 
            color: #ffffff; 
        }
        .matrix-table input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary-light); }
        .count-number { font-weight: 800; color: var(--accent); font-size: 0.95rem; }

        /* JORNADA Y TURNOS */
        .action-bar { display: flex; gap: 8px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .btn-main { border: none; padding: 10px 16px; font-size: 0.85rem; border-radius: 8px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .btn-primary { background: #1e3a8a; color: #60a5fa; border: 1px solid #3b82f6; }
        .btn-secondary { background: #334155; color: white; }
        .btn-success { background: #065f46; color: #34d399; border: 1px solid #059669; }

        .jornada-grid { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            overflow-y: visible; 
            scroll-behavior: smooth; 
            scroll-snap-type: x mandatory; 
            padding: 5px 5px 12px 5px;
            touch-action: pan-x pan-y; 
            -webkit-overflow-scrolling: touch;
        }
        .jornada-grid::-webkit-scrollbar { display: none; }

        .turno-card { 
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; 
            overflow: hidden; flex: 0 0 calc(100% - 10px); scroll-snap-align: center;
        }
        
        @media (min-width: 900px) {
            .jornada-grid { display: grid; grid-template-columns: repeat(4, 1fr); scroll-snap-type: none; overflow-x: visible; }
            .turno-card { flex: none; }
            .config-grid { display: grid; grid-template-columns: repeat(2, 1fr); scroll-snap-type: none; overflow-x: visible; }
            .section-box { flex: none; }
        }

        .turno-header { background: #050505; color: var(--accent); padding: 10px; text-align: center; font-weight: 800; font-size: 0.95rem; border-bottom: 1px solid var(--border-color); }
        .turno-header span { color: #ffffff; display: block; font-size: 0.75rem; margin-top: 2px; }
        
        .results-table { width: 100%; border-collapse: collapse; }
        .results-table td { padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; }
        .carga-title { font-weight: 800; color: #ffffff; font-size: 0.9rem; }
        
        .select-op-editable {
            background: transparent; 
            color: var(--primary-light); 
            border: none; 
            font-weight: 800; 
            font-size: 0.9rem;
            width: 100%; 
            cursor: pointer; 
            outline: none; 
            font-family: inherit; 
            text-transform: uppercase;
            text-align: right; 
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        .select-op-editable::-ms-expand { display: none; }
        .select-op-editable option { background: #111827; color: #fff; }
        .select-op-editable.op-alert { color: var(--accent); }
        .select-op-editable.op-error { color: var(--danger); }
        .select-op-editable.op-manual-forced { color: #f43f5e !important; font-weight: 900; } 

        /* HISTORIAL */
        .history-header { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 15px; gap: 10px; width: 100%; }
        .history-header .section-title { font-size: 0.88rem; font-weight: 800; }
        
        .btn-counter-reset { background: #2a1f08; color: var(--accent); border: 1px solid #78350f; padding: 6px 10px; font-size: 0.78rem; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-clear-hist { background: #271c1c; color: var(--danger); border: 1px solid #7f1d1d; padding: 6px 12px; font-size: 0.75rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .history-list { display: flex; flex-direction: column; gap: 15px; max-height: 70vh; overflow-y: auto; }
        .history-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; }
        .history-item-title { font-weight: 800; color: var(--accent); margin-bottom: 8px; font-size: 0.85rem; border-bottom: 1px solid #1f2937; padding-bottom: 4px; display: flex; justify-content: space-between; }
        .history-item-content { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; font-size: 0.8rem; }
        @media (min-width: 600px) { .history-item-content { grid-template-columns: repeat(4, 1fr); } }
        .history-turno-block { background: #000; padding: 6px; border-radius: 6px; border: 1px solid #1f2937; }
        .history-turno-title { font-weight: 800; color: var(--primary-light); font-size: 0.75rem; margin-bottom: 4px; }
        .history-linea { font-size: 0.75rem; color: #ccc; margin-bottom: 2px; }
        .history-linea strong { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        <h1>Control de Rotaciones</h1>
    </div>

    <div id="tab-config" class="tab-content active">
        <div class="config-grid" id="contenedorConfig">
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">👷 Operarios</span>
                    <button class="btn-add" onclick="agregarFila('listaOps', 'Operario')">+ Añadir</button>
                </div>
                <div id="listaOps" class="item-list"></div>
            </div>
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">📦 Cargas</span>
                    <button class="btn-add" onclick="agregarFila('listaCargas', 'Carga')">+ Añadir</button>
                </div>
                <div id="listaCargas" class="item-list"></div>
            </div>
        </div>
    </div>

    <div id="tab-matriz" class="tab-content">
        <div class="matrix-container" id="contenedorMatriz"></div>
    </div>

    <div id="tab-jornada" class="tab-content">
        <div class="schedule-selector">
            <button id="btnHorarioManana" class="btn-schedule active-day" onclick="seleccionarTipoHorario('manana')">☀️ Mañana</button>
            <button id="btnHorarioTarde" class="btn-schedule" onclick="seleccionarTipoHorario('tarde')">🌙 Tarde</button>
        </div>
        <div class="jornada-grid" id="contenedorJornada"></div>
        <div class="action-bar">
            <button class="btn-main btn-primary" onclick="cambiarCombinacion()">🔄 Combinación Base</button>
            <button class="btn-main btn-success" onclick="guardarEnHistorial()">💾 Guardar Hoy</button>
            <button class="btn-main btn-secondary" onclick="window.print()">🖨️ Imprimir</button>
        </div>
    </div>

    <div id="tab-contador" class="tab-content">
        <div class="history-header">
            <span class="section-title">📊 Veces por Puesto</span>
            <button class="btn-counter-reset" onclick="reiniciarContadoresSemanales()">🔄 Nueva Semana</button>
        </div>
        <div class="matrix-container" id="contenedorContador"></div>
    </div>

    <div id="tab-historial" class="tab-content">
        <div class="history-header">
            <span class="section-title">📂 Historial de Jornadas</span>
            <button class="btn-clear-hist" onclick="borrarTodoElHistorial()">🗑️ Vaciar Todo</button>
        </div>
        <div id="contenedorHistorial" class="history-list"></div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="cambiarPestaña('tab-config', this)">
            <span class="icon">⚙️</span><span>Configurar</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-matriz', this)">
            <span class="icon">🛠️</span><span>Polivalencia</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-jornada', this)">
            <span class="icon">📅</span><span>Turnos</span>
        </button>
        <button class="tab-btn" onclick="cambiarContadorTab(this)">
            <span class="icon">📊</span><span>Contador</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-historial', this)">
            <span class="icon">📂</span><span>Historial</span>
        </button>
    </div>
</div>

<script>
    let saltoInicialJornada = 0;
    let competencies = {};
    let historialJornadas = [];
    let conteoSemanal = {}; 
    let tipoHorarioSeleccionado = "manana"; 
    let cambiosManualesUsuarios = {}; 
    let matrizJornadaCalculada = {};

    const horasMañana = ["05:45 - 08:00", "08:00 - 10:20", "10:20 - 12:00", "12:00 - 14:00"];
    const horasTarde = ["13:45 - 16:20", "16:20 - 18:00", "18:00 - 20:00", "20:00 - 22:00"];

    const defaultOps = ["Óscar", "Manuel", "Sara", "Cesar", "Cristian", "Mario", "Nara", "Operario 8"];
    const defaultCargas = ["Carga 1", "Carga 2", "Carga 3", "Carga 4"];

    window.onload = function() {
        if(localStorage.getItem('hist_competencias_v15')) {
            try { competencies = JSON.parse(localStorage.getItem('hist_competencias_v15')); } catch(e) {}
        }
        if(localStorage.getItem('registro_jornadas_v15')) {
            try { historialJornadas = JSON.parse(localStorage.getItem('registro_jornadas_v15')); } catch(e) {}
        }
        if(localStorage.getItem('conteo_semanal_v15')) {
            try { conteoSemanal = JSON.parse(localStorage.getItem('conteo_semanal_v15')); } catch(e) {}
        }
        if(localStorage.getItem('tipo_horario_v15')) {
            tipoHorarioSeleccionado = localStorage.getItem('tipo_horario_v15');
        }

        let ops = localStorage.getItem('hist_ops_v15') ? JSON.parse(localStorage.getItem('hist_ops_v15')) : defaultOps;
        let cargas = localStorage.getItem('hist_cargas_v15') ? JSON.parse(localStorage.getItem('hist_cargas_v15')) : defaultCargas;

        ops.forEach(v => agregarFila('listaOps', 'Operario', v));
        cargas.forEach(v => agregarFila('listaCargas', 'Carga', v));

        actualizarVisualBotonesHorario();
        procesarCambios();
    };

    function cambiarPestaña(tabId, boton) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        boton.classList.add('active');
        if(tabId === 'tab-historial') renderizarHistorial();
    }

    function cambiarContadorTab(boton) {
        cambiarPestaña('tab-contador', boton);
        renderizarTablaContadores();
    }

    function seleccionarTipoHorario(tipo) {
        tipoHorarioSeleccionado = tipo;
        localStorage.setItem('tipo_horario_v15', tipo);
        cambiosManualesUsuarios = {}; 
        actualizarVisualBotonesHorario();
        recalcularEstructuraCompletaCascada();
    }

    function actualizarVisualBotonesHorario() {
        const btnM = document.getElementById("btnHorarioManana");
        const btnT = document.getElementById("btnHorarioTarde");
        if(!btnM || !btnT) return;
        btnM.className = "btn-schedule";
        btnT.className = "btn-schedule";
        if(tipoHorarioSeleccionado === "manana") btnM.classList.add("active-day");
        else btnT.classList.add("active-afternoon");
    }

    function agregarFila(contenedorId, tipo, valor = "") {
        const contenedor = document.getElementById(contenedorId);
        if(!contenedor) return;
        const row = document.createElement("div");
        row.className = "item-row";
        row.innerHTML = `
            <input type="text" class="item-input" value="${valor}" placeholder="Escribir..." oninput="procesarCambios()">
            <button class="btn-del" onclick="this.parentElement.remove(); procesarCambios();">🗑️</button>
        `;
        contenedor.appendChild(row);
    }

    function leerLista(contenedorId) {
        return Array.from(document.querySelectorAll(`#${contenedorId} .item-input`))
            .map(i => i.value.trim())
            .filter(v => v);
    }

    function procesarCambios() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedorMatriz = document.getElementById("contenedorMatriz");

        localStorage.setItem('hist_ops_v15', JSON.stringify(ops));
        localStorage.setItem('hist_cargas_v15', JSON.stringify(cargas));

        if(ops.length === 0 || cargas.length === 0) return;

        if(contenedorMatriz) {
            let html = `<table class="matrix-table"><thead><tr><th>Operario</th>`;
            cargas.forEach(c => html += `<th>${c}</th>`);
            html += `</tr></thead><tbody>`;

            ops.forEach(op => {
                html += `<tr><td>${op}</td>`;
                cargas.forEach(c => {
                    let clv = `${op}_X_${c}`;
                    let check = (competencies[clv] !== false) ? "checked" : "";
                    html += `<td><input type="checkbox" data-clave="${clv}" ${check} onchange="competencies[this.dataset.clave]=this.checked; localStorage.setItem('hist_competencias_v15', JSON.stringify(competencies)); recalcularEstructuraCompletaCascada();"></td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            contenedorMatriz.innerHTML = html;
        }

        cambiosManualesUsuarios = {}; 
        recalcularEstructuraCompletaCascada();
    }

    function cambiarCombinacion() {
        saltoInicialJornada++;
        cambiosManualesUsuarios = {}; 
        recalcularEstructuraCompletaCascada();
    }

    // Al modificar un valor se guarda de inmediato y se propaga en cadena al instante
    function registrarEdicionManualReactiva(select) {
        let t = parseInt(select.dataset.turno);
        let c = select.dataset.carga;
        let nuevoOp = select.value;

        // Registrar la fijación manual firme
        cambiosManualesUsuarios[`${t}_X_${c}`] = nuevoOp;
        
        // Ejecutar el motor de asignación para recalcular los turnos siguientes automáticamente
        recalcularEstructuraCompletaCascada();
    }

    // 🔥 MOTOR DE RECALCULO AUTOMÁTICO EN CASCADA
    function recalcularEstructuraCompletaCascada() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        if (ops.length === 0 || cargas.length === 0) return;

        matrizJornadaCalculada = {};
        
        // Rastreador diario total de asignaciones estables
        let operariosAsignadosHoyFirme = new Set();
        
        // Registrar primero TODOS los bloqueos manuales que metiste para tenerlos en cuenta como prioridad global
        Object.keys(cambiosManualesUsuarios).forEach(key => {
            let val = cambiosManualesUsuarios[key];
            if (val && val !== "No Apto") {
                operariosAsignadosHoyFirme.add(val);
            }
        });

        // Construir turno por turno en orden cronológico puro
        for (let t = 1; t <= 4; t++) {
            matrizJornadaCalculada[t] = {};
            let operariosEnEsteTurnoMismo = new Set();
            let desplazo = saltoInicialJornada + (t - 1);

            // Fase 1: Forzar tus decisiones manuales en este turno concreto
            cargas.forEach(carga => {
                let claveManual = `${t}_X_${carga}`;
                if (cambiosManualesUsuarios[claveManual]) {
                    let opManual = cambiosManualesUsuarios[claveManual];
                    if (opManual !== "No Apto") {
                        operariosEnEsteTurnoMismo.add(opManual);
                    }
                    matrizJornadaCalculada[t][carga] = {
                        nombre: opManual,
                        manual: true,
                        alerta: opManual !== "No Apto" && competencies[`${opManual}_X_${carga}`] === false
                    };
                }
            });

            // Fase 2: Recalcular de forma automática las cargas libres restantes respetando el día
            cargas.forEach((carga, i) => {
                if (matrizJornadaCalculada[t][carga]) return; // Si ya lo editaste a mano, saltar

                let idxBase = (i + desplazo) % ops.length;
                let asignado = false;

                // Intento 1: Buscar operario apto por polivalencia, que no esté en el turno y libre hoy
                for (let s = 0; s < ops.length; s++) {
                    let candidato = ops[(idxBase + s) % ops.length];

                    if (!operariosEnEsteTurnoMismo.has(candidato) && 
                        !operariosAsignadosHoyFirme.has(candidato) && 
                        competencies[`${candidato}_X_${carga}`] !== false) {
                        
                        matrizJornadaCalculada[t][carga] = { nombre: candidato, manual: false, alerta: false };
                        operariosEnEsteTurnoMismo.add(candidato);
                        operariosAsignadosHoyFirme.add(candidato);
                        asignado = true;
                        break;
                    }
                }

                // Intento 2: Si la polivalencia estricta falla, buscar operario libre ignorando check de polivalencia (marca alerta)
                if (!asignado) {
                    for (let s = 0; s < ops.length; s++) {
                        let candidato = ops[(idxBase + s) % ops.length];

                        if (!operariosEnEsteTurnoMismo.has(candidato) && !operariosAsignadosHoyFirme.has(candidato)) {
                            matrizJornadaCalculada[t][carga] = { nombre: candidato, manual: false, alerta: true };
                            operariosEnEsteTurnoMismo.add(candidato);
                            operariosAsignadosHoyFirme.add(candidato);
                            asignado = true;
                            break;
                        }
                    }
                }

                // Intento 3: Si no queda ningún operario libre en el banquillo del día, poner No Apto para tu intervención
                if (!asignado) {
                    matrizJornadaCalculada[t][carga] = { nombre: "No Apto", manual: false, error: true };
                }
            });
        }

        // Renderizar inmediatamente la interfaz con los datos recalculados
        dibujarEstructuraTurnosDOM();
    }

    // Construye los módulos visuales de los turnos en la pantalla
    function dibujarEstructuraTurnosDOM() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedor = document.getElementById("contenedorJornada");
        if(!contenedor) return;

        const horasActivas = (tipoHorarioSeleccionado === "manana") ? horasMañana : horasTarde;
        contenedor.innerHTML = "";

        for (let t = 1; t <= 4; t++) {
            const card = document.createElement("div");
            card.className = "turno-card";
            let html = `<div class="turno-header">TURNO ${t} <span>⏱️ ${horasActivas[t-1]}</span></div><table class="results-table">`;

            cargas.forEach(carga => {
                let res = (matrizJornadaCalculada[t] && matrizJornadaCalculada[t][carga]) || {nombre: "No Apto", manual: false};
                let claseExtra = res.manual ? "op-manual-forced" : res.alerta ? "op-alert" : res.error ? "op-error" : "";

                html += `<tr>
                    <td class="carga-title">${carga}</td>
                    <td>
                        <select class="select-op-editable ${claseExtra}" data-turno="${t}" data-carga="${carga}" onchange="registrarEdicionManualReactiva(this)">
                            ${ops.map(o => `<option value="${o}" ${o === res.nombre ? 'selected' : ''}>${o}</option>`).join('')}
                            <option value="No Apto" ${res.nombre === 'No Apto' ? 'selected' : ''}>⚠️ No Apto</option>
                        </select>
                    </td>
                </tr>`;
            });

            html += `</table>`;
            card.innerHTML = html;
            contenedor.appendChild(card);
        }
    }

    function renderizarTablaContadores() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedor = document.getElementById("contenedorContador");
        if(!contenedor || ops.length === 0 || cargas.length === 0) return;

        let html = `<table class="matrix-table"><thead><tr><th>Operario</th>`;
        cargas.forEach(c => html += `<th>${c}</th>`);
        html += `</tr></thead><tbody>`;

        ops.forEach(op => {
            html += `<tr><td>${op}</td>`;
            cargas.forEach(c => {
                let clv = `${op}_X_${c}`;
                let total = conteoSemanal[clv] || 0;
                html += `<td class="count-number">${total}</td>`;
            });
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        contenedor.innerHTML = html;
    }

    function guardarEnHistorial() {
        if(Object.keys(matrizJornadaCalculada).length === 0) return;

        for(let t=1; t<=4; t++) {
            for(let c in matrizJornadaCalculada[t]) {
                let opAsignado = matrizJornadaCalculada[t][c].nombre;
                if(opAsignado !== "No Apto") {
                    let clv = `${opAsignado}_X_${c}`;
                    if(!conteoSemanal[clv]) conteoSemanal[clv] = 0;
                    conteoSemanal[clv]++;
                }
            }
        }
        localStorage.setItem('conteo_semanal_v15', JSON.stringify(conteoSemanal));

        let copiaTurnos = {};
        for(let t=1; t<=4; t++) {
            copiaTurnos[t] = {};
            for(let c in matrizJornadaCalculada[t]) {
                copiaTurnos[t][c] = matrizJornadaCalculada[t][c].nombre;
            }
        }

        let fechaActual = new Date();
        let nuevaJornada = {
            id: Date.now(),
            fecha: fechaActual.toLocaleDateString("es-ES"),
            hora: fechaActual.toLocaleTimeString("es-ES", {hour: '2-digit', minute:'2-digit'}),
            tipoHorario: tipoHorarioSeleccionado === "manana" ? "☀️ Mañana" : "🌙 Tarde",
            datos: copiaTurnos
        };

        historialJornadas.unshift(nuevaJornada);
        localStorage.setItem('registro_jornadas_v15', JSON.stringify(historialJornadas));
        alert("💾 ¡Jornada guardada con éxito en el historial y sumada al contador!");
    }

    function renderizarHistorial() {
        const contenedor = document.getElementById("contenedorHistorial");
        if(!contenedor) return;
        contenedor.innerHTML = "";

        if(historialJornadas.length === 0) {
            contenedor.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:20px; font-size:0.85rem;">No hay jornadas guardadas todavía.</div>`;
            return;
        }

        historialJornadas.forEach(jornada => {
            const item = document.createElement("div");
            item.className = "history-item";
            let htmlTitle = `<div class="history-item-title">
                <span>📅 ${jornada.fecha} (${jornada.hora}) - ${jornada.tipoHorario}</span>
                <button style="background:transparent; border:none; color:var(--danger); font-weight:bold; cursor:pointer;" onclick="borrarJornadaIndividual(${jornada.id})">❌</button>
            </div>`;
            
            let htmlContent = `<div class="history-item-content">`;
            for(let t=1; t<=4; t++) {
                htmlContent += `<div class="history-turno-block"><div class="history-turno-title">TURNO ${t}</div>`;
                if(jornada.datos && jornada.datos[t]) {
                    for(let carga in jornada.datos[t]) {
                        htmlContent += `<div class="history-linea">${carga}: <strong>${jornada.datos[t][carga]}</strong></div>`;
                    }
                }
                htmlContent += `</div>`;
            }
            htmlContent += `</div>`;
            item.innerHTML = htmlTitle + htmlContent;
            contenedor.appendChild(item);
        });
    }

    function borrarJornadaIndividual(id) {
        if(confirm("¿Seguro que quieres borrar este registro?")) {
            historialJornadas = historialJornadas.filter(j => j.id !== id);
            localStorage.setItem('registro_jornadas_v15', JSON.stringify(historialJornadas));
            renderizarHistorial();
        }
    }

    function borrarTodoElHistorial() {
        if(confirm("¿Vaciar todo el historial?")) {
            historialJornadas = [];
            localStorage.removeItem('registro_jornadas_v15');
            renderizarHistorial();
        }
    }

    function reiniciarContadoresSemanales() {
        if(confirm("¿Reiniciar la semana?")) {
            conteoSemanal = {};
            localStorage.removeItem('conteo_semanal_v15');
            renderizarTablaContadores();
        }
    }
</script>
