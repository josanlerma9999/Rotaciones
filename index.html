<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Rotaciones</title>
    <style>
        :root { 
            --bg-main: #000000;       /* Fondo negro puro como la foto */
            --bg-card: #111827;       /* Fondo de tarjetas gris oscuro mate */
            --primary: #3b82f6;       
            --primary-light: #22d3ee; /* Azul Neón / Cian de la foto */
            --accent: #f59e0b;        /* Amarillo Oro de los números de la foto */
            --text-main: #ffffff;     /* Blanco puro para cargas */
            --text-muted: #94a3b8;    
            --success: #10b981; 
            --danger: #f43f5e; 
            --border-color: #1f2937;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            padding: 15px; 
            margin: 0; 
            padding-bottom: 85px; 
        }
        
        .container { max-width: 1200px; margin: auto; }
        
        /* RÓTULO PRINCIPAL PROFESIONAL (Sin subtítulos ni emojis) */
        .main-header {
            text-align: center;
            padding: 20px 0 25px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .main-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 900;
            color: #ffffff;
            display: inline-block;
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 6px;
        }

        /* PESTAÑAS ABAJO DE LA PANTALLA */
        .tabs-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: #0a0a0a; 
            display: flex; 
            justify-content: space-around;
            padding: 8px 5px; 
            border-top: 1px solid #222;
            z-index: 9999;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.6);
        }
        
        .tab-btn { 
            flex: 1; 
            border: none; 
            background: transparent; 
            color: var(--text-muted); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            font-size: 0.75rem; 
            font-weight: 600;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .tab-btn .icon { font-size: 1.4rem; }
        .tab-btn.active { color: var(--primary-light); transform: scale(1.05); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Pestaña 1: Configuración */
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .section-box { background: var(--bg-card); border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-title { font-weight: 800; color: var(--primary-light); font-size: 0.95rem; }
        .btn-add { background: #1e3a8a; color: #60a5fa; border: 1px solid #3b82f6; padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .item-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
        .item-row { display: flex; gap: 8px; align-items: center; }
        
        #listaOps .item-input { flex: 1; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; background: #000; color: var(--primary-light); font-weight: 700; }
        #listaCargas .item-input { flex: 1; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; background: #000; color: #fff; font-weight: 800; }
        .item-input:focus { border-color: var(--primary-light); outline: none; }
        
        .btn-del { background: #2a1f08; color: var(--accent); border: 1px solid #78350f; padding: 10px; border-radius: 50%; cursor: pointer; font-weight: bold; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; }

        /* Pestaña 2: Matriz */
        .matrix-container { overflow-x: auto; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; }
        .matrix-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .matrix-table th { background: #111827; color: var(--text-muted); font-size: 0.75rem; padding: 12px 10px; border: 1px solid var(--border-color); font-weight: 700; text-transform: uppercase; }
        .matrix-table td { padding: 10px; text-align: center; border: 1px solid var(--border-color); font-size: 0.85rem; color: #ffffff; }
        .matrix-table td:first-child { text-align: left; font-weight: 700; background: #050505; color: var(--primary-light); position: sticky; left: 0; z-index: 1; border-right: 2px solid var(--border-color); }
        .matrix-table input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary-light); }

        /* Botones de acción */
        .action-bar { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .btn-main { border: none; padding: 12px 20px; font-size: 0.9rem; border-radius: 8px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-primary { background: #1e3a8a; color: #60a5fa; border: 1px solid #3b82f6; }
        .btn-secondary { background: #334155; color: white; }
        .btn-success { background: #065f46; color: #34d399; border: 1px solid #059669; }
        .btn-main:hover { opacity: 0.95; transform: translateY(-1px); }

        /* Pestaña 3: Vista de Turnos */
        .jornada-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 15px; }
        .turno-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
        
        .turno-header { background: #050505; color: var(--accent); padding: 12px; text-align: center; font-weight: 800; font-size: 1rem; border-bottom: 1px solid var(--border-color); letter-spacing: 0.5px; }
        .turno-header span { color: #ffffff; display: block; font-size: 0.8rem; margin-top: 3px; font-weight: 600; opacity: 0.8; }
        
        .results-table { width: 100%; border-collapse: collapse; }
        .results-table td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
        .results-table tr:last-child td { border-bottom: none; }
        
        .carga-title { font-weight: 800; color: #ffffff; font-size: 1rem; letter-spacing: -0.3px; }
        
        .op-badge { 
            background: transparent;      
            color: var(--primary-light);  
            padding: 2px 0; 
            font-weight: 800; 
            font-size: 0.95rem; 
            display: inline-block; 
            text-transform: uppercase;   
            letter-spacing: 0.5px;
        }
        
        .op-alert { color: var(--accent); } 
        .op-error { color: var(--danger); text-decoration: line-through; }

        /* Pestaña 4: Historial */
        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; margin-bottom: 12px; }
        .history-date { font-weight: bold; color: var(--accent); font-size: 0.9rem; }
        .btn-clear-hist { background: transparent; border: none; color: var(--danger); font-size: 0.85rem; cursor: pointer; text-decoration: underline; font-weight: bold; }

        @media print {
            .tabs-nav, .config-grid, .matrix-container, .action-bar, .btn-clear-hist, .main-header { display: none !important; }
            body { background: white; padding: 0; color: black; }
            .container { padding: 0; }
            .tab-content { display: none !important; }
            #tab-jornada { display: block !important; }
            .jornada-grid { grid-template-columns: 1fr 1fr; gap: 20px; }
            .turno-card { border: 1px solid #000; page-break-inside: avoid; background: white; }
            .turno-header { background: #e2e8f0 !important; color: black !important; border-bottom: 1px solid #000; }
            .turno-header span { color: black !important; }
            .carga-title { color: black !important; }
            .op-badge { background: none; color: black !important; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- NUEVO RÓTULO LIMPIO Y PROFESIONAL -->
    <div class="main-header">
        <h1>Control de Rotaciones</h1>
    </div>

    <!-- PESTAÑA 1: CONFIGURACIÓN -->
    <div id="tab-config" class="tab-content active">
        <div class="config-grid">
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">👷 Operarios en turno</span>
                    <button class="btn-add" onclick="agregarFila('listaOps', 'Operario')">+ Añadir</button>
                </div>
                <div id="listaOps" class="item-list"></div>
            </div>
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">📦 Cargas de Trabajo</span>
                    <button class="btn-add" onclick="agregarFila('listaCargas', 'Carga')">+ Añadir</button>
                </div>
                <div id="listaCargas" class="item-list"></div>
            </div>
        </div>
    </div>

    <!-- PESTAÑA 2: POLIVALENCIA -->
    <div id="tab-matriz" class="tab-content">
        <div class="matrix-container" id="contenedorMatriz"></div>
    </div>

    <!-- PESTAÑA 3: JORNADA DEFINITIVA -->
    <div id="tab-jornada" class="tab-content">
        <div class="jornada-grid" id="contenedorJornada"></div>
        <div class="action-bar">
            <button class="btn-main btn-primary" onclick="cambiarCombinacion()">🔄 Combinación</button>
            <button class="btn-main btn-success" onclick="guardarEnHistorial()">💾 Guardar Hoy</button>
            <button class="btn-main btn-secondary" onclick="window.print()">🖨️ Imprimir</button>
        </div>
    </div>

    <!-- PESTAÑA 4: HISTORIAL -->
    <div id="tab-historial" class="tab-content">
        <div class="history-header" style="border:none; margin:0;">
            <span class="section-title">🗄️ Historial de Jornadas</span>
            <button class="btn-clear-hist" onclick="borrarTodoElHistorial()">🗑️ Vaciar</button>
        </div>
        <div id="contenedorHistorial" class="history-list" style="margin-top: 15px;"></div>
    </div>

    <!-- NAVBAR INFERIOR -->
    <div class="tabs-nav">
        <button class="tab-btn active" onclick="cambiarPestaña('tab-config', this)">
            <span class="icon">⚙️</span>
            <span>Configurar</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-matriz', this)">
            <span class="icon">🛠️</span>
            <span>Polivalencia</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-jornada', this)">
            <span class="icon">📅</span>
            <span>Ver Turnos</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-historial', this)">
            <span class="icon">🗄️</span>
            <span>Historial</span>
        </button>
    </div>
</div>

<script>
    let saltoInicialJornada = 0;
    let competencias = {};
    let historialJornadas = [];

    const defaultOps = ["Sara", "Cesar", "Cristian", "Mario", "Nara", "Operario 6"];
    const defaultCargas = ["Conexiones", "Bateria M", "Carga 3", "Carga 4", "Carga 5", "Carga 6", "Carga 7", "Carga 8", "Carga 9", "Carga 10", "Carga 11", "Carga 12"];

    window.onload = function() {
        if(localStorage.getItem('hist_competencias_v7')) {
            try { competencias = JSON.parse(localStorage.getItem('hist_competencias_v7')); } catch(e) {}
        }
        if(localStorage.getItem('registro_jornadas_v7')) {
            try { historialJornadas = JSON.parse(localStorage.getItem('registro_jornadas_v7')); } catch(e) {}
        }

        let ops = localStorage.getItem('hist_ops_v7') ? JSON.parse(localStorage.getItem('hist_ops_v7')) : defaultOps;
        let cargas = localStorage.getItem('hist_cargas_v7') ? JSON.parse(localStorage.getItem('hist_cargas_v7')) : defaultCargas;

        ops.forEach(v => agregarFila('listaOps', 'Operario', v));
        cargas.forEach(v => agregarFila('listaCargas', 'Carga', v));

        procesarCambios();
        renderizarHistorial();
    };

    function cambiarPestaña(tabId, boton) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        boton.classList.add('active');
    }

    function agregarFila(contenedorId, tipo, valor = "") {
        const contenedor = document.getElementById(contenedorId);
        const row = document.createElement("div");
        row.className = "item-row";
        row.innerHTML = `
            <input type="text" class="item-input" value="${valor}" placeholder="Escribir..." oninput="procesarCambios()">
            <button class="btn-del" onclick="this.parentElement.remove(); procesarCambios();">🗑️</button>
        `;
        contenedor.appendChild(row);
        if(!valor) row.querySelector('.item-input').focus();
    }

    function leerLista(contenedorId) {
        return Array.from(document.querySelectorAll(`#${contenedorId} .item-input`))
            .map(i => i.value.trim())
            .filter(v => v);
    }

    function procesarCambios() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");

        localStorage.setItem('hist_ops_v7', JSON.stringify(ops));
        localStorage.setItem('hist_cargas_v7', JSON.stringify(cargas));

        const contenedorMatriz = document.getElementById("contenedorMatriz");
        if(ops.length === 0 || cargas.length === 0) {
            contenedorMatriz.innerHTML = "<p style='padding:15px; color:gray;'>Carga operarios y tareas en Configuración.</p>";
            return;
        }

        let html = `<table class="matrix-table"><thead><tr><th>Operario</th>`;
        cargas.forEach(c => html += `<th>${c}</th>`);
        html += `</tr></thead><tbody>`;

        ops.forEach(op => {
            html += `<tr><td>${op}</td>`;
            cargas.forEach(c => {
                let clv = `${op}_X_${c}`;
                let check = (competencias[clv] !== false) ? "checked" : "";
                html += `<td><input type="checkbox" data-clave="${clv}" ${check} onchange="competencias[this.dataset.clave]=this.checked; localStorage.setItem('hist_competencias_v7', JSON.stringify(competencias)); generarJornadaCompleta();"></td>`;
            });
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        contenedorMatriz.innerHTML = html;

        generarJornadaCompleta();
    }

    function cambiarCombinacion() {
        saltoInicialJornada++;
        generarJornadaCompleta();
    }

    function generarJornadaCompleta() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedor = document.getElementById("contenedorJornada");
        contenedor.innerHTML = "";

        if(ops.length === 0 || cargas.length === 0) return;

        let horaBase = new Date();

        for (let t = 0; t < 4; t++) {
            let hInicio = horaBase.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            horaBase.setHours(horaBase.getHours() + 2);
            let hFin = horaBase.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const card = document.createElement("div");
            card.className = "turno-card";
            let html = `<div class="turno-header">TURNO ${t + 1} <span>⏱️ ${hInicio} - ${hFin}</span></div><table class="results-table">`;

            let desplazo = saltoInicialJornada + t;

            cargas.forEach((carga, i) => {
                let idx = (i + desplazo) % ops.length;
                let opAsignado = ops[idx];
                let clase = "op-badge";

                if (competencias[`${opAsignado}_X_${carga}`] === false) {
                    let sEncontrado = null;
                    for (let s = 1; s < ops.length; s++) {
                        let cnd = ops[(idx + s) % ops.length];
                        if (competencias[`${cnd}_X_${carga}`] !== false) { sEncontrado = cnd; break; }
                    }
                    if (sEncontrado) { opAsignado = sEncontrado; clase += " op-alert"; }
                    else { opAsignado = "No Apto"; clase += " op-error"; }
                }

                html += `<tr><td class="carga-title">${carga}</td><td><span class="${clase}">${opAsignado}</span></td></tr>`;
            });

            html += `</table>`;
            card.innerHTML = html;
            contenedor.appendChild(card);
        }
    }

    function guardarEnHistorial() {
        const contenedor = document.getElementById("contenedorJornada").innerHTML;
        if(!contenedor.trim()) return;

        let fecha = new Date().toLocaleString([], {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit'});
        historialJornadas.unshift({ fecha: fecha, html: contenedor });
        
        localStorage.setItem('registro_jornadas_v7', JSON.stringify(historialJornadas));
        renderizarHistorial();
        alert("✅ ¡Jornada guardada con éxito!");
    }

    function renderizarHistorial() {
        const lista = document.getElementById("contenedorHistorial");
        lista.innerHTML = "";
        
        if(historialJornadas.length === 0) {
            lista.innerHTML = "<p style='color:gray; font-size:0.9rem;'>No hay jornadas guardadas todavía.</p>";
            return;
        }

        historialJornadas.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "history-card";
            div.innerHTML = `
                <div class="history-header">
                    <span class="history-date">📅 Registro: ${item.fecha}</span>
                    <button class="btn-clear-hist" style="color:var(--danger);" onclick="eliminarRegistroIndividual(${index})">Eliminar</button>
                </div>
                <div class="jornada-grid">${item.html}</div>
            `;
            lista.appendChild(div);
        });
    }

    function eliminarRegistroIndividual(index) {
        historialJornadas.splice(index, 1);
        localStorage.setItem('registro_jornadas_v7', JSON.stringify(historialJornadas));
        renderizarHistorial();
    }

    function borrarTodoElHistorial() {
        if(confirm("¿Seguro que quieres borrar todo el registro histórico?")) {
            historialJornadas = [];
            localStorage.removeItem('registro_jornadas_v7');
            renderizarHistorial();
        }
    }
</script>

</body>
</html>
