<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Rotaciones - Compacto</title>
    <style>
        :root { 
            --bg-main: #000000;       
            --bg-card: #111827;       
            --primary: #3b82f6;       
            --primary-light: #22d3ee; 
            --accent: #f59e0b;        
            --text-main: #ffffff;     
            --text-muted: #94a3b8;    
            --success: #10b981; 
            --danger: #f43f5e; 
            --border-color: #1f2937;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            padding: 12px; 
            margin: 0; 
            padding-bottom: 85px; 
            font-size: 0.85rem; /* Base ligeramente menor */
        }
        
        .container { max-width: 1200px; margin: auto; display: flex; flex-direction: column; min-height: calc(100vh - 100px); }
        
        .main-header { display: flex; align-items: center; justify-content: center; padding: 4px 0 8px 0; }
        .main-header h1 { margin: 0; font-size: 0.95rem; font-weight: 800; color: #ffffff; text-transform: uppercase; border-bottom: 2px solid var(--primary-light); padding-bottom: 4px; text-align: center; }

        /* 🔥 AJUSTES PESTAÑA CONFIGURAR (COMPACTA) 🔥 */
        .config-grid { 
            display: flex; gap: 10px; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; 
            padding: 5px 5px 15px 5px; flex-grow: 1; touch-action: pan-x; -webkit-overflow-scrolling: touch;
        }
        .config-grid::-webkit-scrollbar { display: none; }

        .section-box { 
            background: var(--bg-card); border-radius: 10px; padding: 10px; border: 1px solid var(--border-color);
            flex: 0 0 calc(100% - 10px); scroll-snap-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
        }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .section-title { font-weight: 700; color: var(--primary-light); font-size: 0.85rem; }
        
        /* Botones y Inputs más pequeños */
        .btn-add { background: #1e3a8a; color: #60a5fa; border: 1px solid #3b82f6; padding: 4px 8px; font-size: 0.7rem; border-radius: 5px; cursor: pointer; font-weight: 700; }
        
        .item-list { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; overflow-y: auto; padding-right: 4px; }
        .item-row { display: flex; gap: 6px; align-items: center; width: 100%; }
        
        .item-input { flex: 1; padding: 7px 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.8rem; background: #000; color: var(--text-main); font-weight: 600; }
        .item-input:focus { border-color: var(--primary-light); outline: none; }
        
        .btn-del { background: #2a1f08; color: var(--accent); border: 1px solid #78350f; padding: 0; border-radius: 50%; cursor: pointer; font-weight: bold; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; }

        /* Estilos generales constantes */
        .tabs-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; display: flex; justify-content: space-around; padding: 6px 4px; border-top: 1px solid #222; z-index: 9999; }
        .tab-btn { flex: 1; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 0.6rem; font-weight: 600; }
        .tab-btn .icon { font-size: 1rem; }
        .tab-btn.active { color: var(--primary-light); }
        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; flex-grow: 1; }

        /* Ajustes menores para el resto de tablas */
        .matrix-table th, .matrix-table td { font-size: 0.75rem; padding: 8px 4px; }
        .matrix-table th:first-child, .matrix-table td:first-child { width: 90px; }
        
        @media (min-width: 900px) {
            .config-grid { display: grid; grid-template-columns: repeat(2, 1fr); scroll-snap-type: none; overflow-x: visible; }
            .section-box { flex: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header"><h1>Control de Rotaciones</h1></div>

    <div id="tab-config" class="tab-content active">
        <div class="config-grid" id="contenedorConfig">
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">👷 Operarios</span>
                    <button class="btn-add" onclick="agregarFila('listaOps', 'Operario')">+ Añadir</button>
                </div>
                <div id="listaOps" class="item-list"></div>
            </div>
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">📦 Cargas</span>
                    <button class="btn-add" onclick="agregarFila('listaCargas', 'Carga')">+ Añadir</button>
                </div>
                <div id="listaCargas" class="item-list"></div>
            </div>
        </div>
    </div>

    <!-- Pestañas restantes (mismo JS anterior) -->
    <!-- ... (El resto del contenido HTML y Script permanece igual) ... -->

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="cambiarPestaña('tab-config', this)"><span class="icon">⚙️</span><span>Configurar</span></button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-matriz', this)"><span class="icon">🛠️</span><span>Polivalencia</span></button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-jornada', this)"><span class="icon">📅</span><span>Turnos</span></button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-contador', this)"><span class="icon">📊</span><span>Contador</span></button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-historial', this)"><span class="icon">📂</span><span>Historial</span></button>
    </div>
</div>

<script>
    // Mantener la misma lógica de funciones: agregarFila, procesarCambios, etc.
    function agregarFila(contenedorId, tipo, valor = "") {
        const contenedor = document.getElementById(contenedorId);
        const row = document.createElement("div");
        row.className = "item-row";
        row.innerHTML = `
            <input type="text" class="item-input" value="${valor}" placeholder="Nombre..." oninput="procesarCambios()">
            <button class="btn-del" onclick="this.parentElement.remove(); procesarCambios();">🗑️</button>
        `;
        contenedor.appendChild(row);
    }
    
    function cambiarPestaña(tabId, boton) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        boton.classList.add('active');
    }
    // ... (El resto del script original sigue aquí) ...
</script>
</body>
</html>
