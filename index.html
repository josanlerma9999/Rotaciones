<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Rotaciones Profesional</title>
    <style>
        :root { 
            --primary: #1e3a8a; /* Azul Marino Profesional */
            --primary-light: #3b82f6; 
            --accent: #f59e0b; 
            --bg: #f8fafc; 
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --success: #10b981; 
            --danger: #ef4444; 
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text-main); padding: 15px; margin: 0; padding-bottom: 40px; }
        .container { max-width: 1200px; margin: auto; background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(15,23,42,0.05); }
        
        h1 { text-align: center; color: var(--primary); margin: 0 0 5px 0; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 20px; font-size: 0.85rem; }

        /* Navegación por Pestañas (Diseño Móvil Premium) */
        .tabs-nav { display: flex; gap: 5px; background: #e2e8f0; padding: 4px; border-radius: 12px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
        .tabs-nav::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 1; border: none; padding: 10px 12px; font-size: 0.85rem; font-weight: 700; border-radius: 9px; cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.2s; text-align: center; white-space: nowrap; }
        .tab-btn.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Pestaña 1: Configuración de listas */
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .section-box { background: #f1f5f9; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-title { font-weight: 700; color: var(--primary); font-size: 0.95rem; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .item-list { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; }
        .item-row { display: flex; gap: 8px; align-items: center; }
        .item-input { flex: 1; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; background: white; }
        .btn-del { background: #e2e8f0; color: var(--danger); border: none; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Pestaña 2: Matriz */
        .matrix-container { overflow-x: auto; background: white; border: 1px solid #e2e8f0; border-radius: 12px; }
        .matrix-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .matrix-table th { background: #f1f5f9; color: var(--text-muted); font-size: 0.75rem; padding: 10px; border: 1px solid #e2e8f0; font-weight: 700; text-transform: uppercase; }
        .matrix-table td { padding: 8px; text-align: center; border: 1px solid #e2e8f0; font-size: 0.85rem; }
        .matrix-table td:first-child { text-align: left; font-weight: 700; background: #f8fafc; color: var(--primary); position: sticky; left: 0; z-index: 1; border-right: 2px solid #e2e8f0; }
        .matrix-table input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

        /* Botones de acción inferiores */
        .action-bar { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .btn-main { border: none; padding: 12px 20px; font-size: 0.9rem; border-radius: 8px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(30,58,138,0.2); }
        .btn-secondary { background: #64748b; color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-main:hover { opacity: 0.95; transform: translateY(-1px); }

        /* Pestaña 3: Vista de Turnos Definitiva */
        .jornada-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .turno-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .turno-header { background: var(--primary); color: white; padding: 10px; text-align: center; font-weight: 800; font-size: 0.95rem; letter-spacing: 0.5px; }
        .turno-header span { color: var(--accent); display: block; font-size: 0.75rem; margin-top: 2px; font-weight: 600; }
        .results-table { width: 100%; border-collapse: collapse; }
        .results-table td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        .results-table tr:last-child td { border-bottom: none; }
        .carga-title { font-weight: 600; color: #334155; }
        .op-badge { background: #e0f2fe; color: #0369a1; padding: 3px 10px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; display: inline-block; }
        .op-alert { background: #fef3c7; color: #b45309; }
        .op-error { background: #fee2e2; color: #b91c1c; }

        /* Pestaña 4: Historial Guardado */
        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #cbd5e1; padding-bottom: 8px; margin-bottom: 10px; }
        .history-date { font-weight: bold; color: var(--primary); font-size: 0.9rem; }
        .btn-clear-hist { background: transparent; border: none; color: var(--danger); font-size: 0.8rem; cursor: pointer; text-decoration: underline; font-weight: bold; }

        @media print {
            .tabs-nav, .config-grid, .matrix-container, .action-bar, .btn-clear-hist, h1, .subtitle { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 0; }
            .tab-content { display: none !important; }
            #tab-jornada { display: block !important; }
            .jornada-grid { grid-template-columns: 1fr 1fr; gap: 20px; }
            .turno-card { border: 1px solid #94a3b8; page-break-inside: avoid; }
            .turno-header { background: #f1f5f9 !important; color: black !important; border-bottom: 1px solid #94a3b8; }
            .turno-header span { color: black !important; }
            .op-badge { background: none; border: 1px solid #cbd5e1; color: black; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Control de Rotaciones</h1>
    <p class="subtitle">Panel inteligente de gestión de turnos</p>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="cambiarPestaña('tab-config', this)">⚙️ Configurar Día</button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-matriz', this)">🛠️ Polivalencia</button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-jornada', this)">📅 Ver Jornada</button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-historial', this)">🗄️ Historial</button>
    </div>

    <div id="tab-config" class="tab-content active">
        <div class="config-grid">
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">👷 Operarios en turno</span>
                    <button class="btn-add" onclick="agregarFila('listaOps', 'Operario')">+ Añadir</button>
                </div>
                <div id="listaOps" class="item-list"></div>
            </div>
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">📦 Cargas de Trabajo</span>
                    <button class="btn-add" onclick="agregarFila('listaCargas', 'Carga')">+ Añadir</button>
                </div>
                <div id="listaCargas" class="item-list"></div>
            </div>
        </div>
    </div>

    <div id="tab-matriz" class="tab-content">
        <div class="matrix-container" id="contenedorMatriz"></div>
    </div>

    <div id="tab-jornada" class="tab-content">
        <div class="jornada-grid" id="contenedorJornada"></div>
        <div class="action-bar">
            <button class="btn-main btn-primary" onclick="cambiarCombinacion()">🔄 Cambiar Combinación</button>
            <button class="btn-main btn-success" onclick="guardarEnHistorial()">💾 Guardar Jornada de Hoy</button>
            <button class="btn-main btn-secondary" onclick="window.print()">🖨️ Imprimir Pantalla</button>
        </div>
    </div>

    <div id="tab-historial" class="tab-content">
        <div class="history-header" style="border:none; margin:0;">
            <span class="section-title">🗄️ Registro de Jornadas Anteriores</span>
            <button class="btn-clear-hist" onclick="borrarTodoElHistorial()">🗑️ Borrar Historial</button>
        </div>
        <div id="contenedorHistorial" class="history-list" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
    let saltoInicialJornada = 0;
    let competencias = {};
    let historialJornadas = [];

    const defaultOps = ["Sara", "Cesar", "Cristian", "Mario", "Nara", "Operario 6"];
    const defaultCargas = ["Conexiones", "Bateria M", "Carga 3", "Carga 4", "Carga 5", "Carga 6", "Carga 7", "Carga 8", "Carga 9", "Carga 10", "Carga 11", "Carga 12"];

    window.onload = function() {
        if(localStorage.getItem('hist_competencias')) {
            try { competencias = JSON.parse(localStorage.getItem('hist_competencias')); } catch(e) {}
        }
        if(localStorage.getItem('registro_jornadas')) {
            try { historialJornadas = JSON.parse(localStorage.getItem('registro_jornadas')); } catch(e) {}
        }

        let ops = localStorage.getItem('hist_ops') ? JSON.parse(localStorage.getItem('hist_ops')) : defaultOps;
        let cargas = localStorage.getItem('hist_cargas') ? JSON.parse(localStorage.getItem('hist_cargas')) : defaultCargas;

        ops.forEach(v => agregarFila('listaOps', 'Operario', v));
        cargas.forEach(v => agregarFila('listaCargas', 'Carga', v));

        procesarCambios();
        renderizarHistorial();
    };

    function cambiarPestaña(tabId, boton) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        boton.classList.add('active');
    }

    function agregarFila(contenedorId, tipo, valor = "") {
        const contenedor = document.getElementById(contenedorId);
        const row = document.createElement("div");
        row.className = "item-row";
        row.innerHTML = `
            <input type="text" class="item-input" value="${valor}" placeholder="Nombre..." oninput="procesarCambios()">
            <button class="btn-del" onclick="this.parentElement.remove(); procesarCambios();">🗑️</button>
        `;
        contenedor.appendChild(row);
        if(!valor) row.querySelector('.item-input').focus();
    }

    function leerLista(contenedorId) {
        return Array.from(document.querySelectorAll(`#${contenedorId} .item-input`))
            .map(i => i.value.trim())
            .filter(v => v);
    }

    function procesarCambios() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");

        localStorage.setItem('hist_ops', JSON.stringify(ops));
        localStorage.setItem('hist_cargas', JSON.stringify(cargas));

        // Reconstruir Matriz Polivalencia
        const contenedorMatriz = document.getElementById("contenedorMatriz");
        if(ops.length === 0 || cargas.length === 0) {
            contenedorMatriz.innerHTML = "<p style='padding:15px; color:gray;'>Carga operarios y tareas en Configuración.</p>";
            return;
        }

        let html = `<table class="matrix-table"><thead><tr><th>Operario</th>`;
        cargas.forEach(c => html += `<th>${c}</th>`);
        html += `</tr></thead><tbody>`;

        ops.forEach(op => {
            html += `<tr><td>${op}</td>`;
            cargas.forEach(c => {
                let clv = `${op}_X_${c}`;
                let check = (competencias[clv] !== false) ? "checked" : "";
                html += `<td><input type="checkbox" data-clave="${clv}" ${check} onchange="competencias[this.dataset.clave]=this.checked; localStorage.setItem('hist_competencias', JSON.stringify(competencias)); generarJornadaCompleta();"></td>`;
            });
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        contenedorMatriz.innerHTML = html;

        generarJornadaCompleta();
    }

    function cambiarCombinacion() {
        saltoInicialJornada++;
        generarJornadaCompleta();
    }

    function generarJornadaCompleta() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedor = document.getElementById("contenedorJornada");
        contenedor.innerHTML = "";

        if(ops.length === 0 || cargas.length === 0) return;

        let horaBase = new Date();

        for (let t = 0; t < 4; t++) {
            let hInicio = horaBase.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            horaBase.setHours(horaBase.getHours() + 2);
            let hFin = horaBase.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const card = document.createElement("div");
            card.className = "turno-card";
            let html = `<div class="turno-header">TURNO ${t + 1} <span>⏱️ ${hInicio} - ${hFin}</span></div><table class="results-table">`;

            let desplazo = saltoInicialJornada + t;

            cargas.forEach((carga, i) => {
                let idx = (i + desplazo) % ops.length;
                let opAsignado = ops[idx];
                let clase = "op-badge";

                if (competencias[`${opAsignado}_X_${carga}`] === false) {
                    let sEncontrado = null;
                    for (let s = 1; s < ops.length; s++) {
                        let cnd = ops[(idx + s) % ops.length];
                        if (competencias[`${cnd}_X_${carga}`] !== false) { sEncontrado = cnd; break; }
                    }
                    if (sEncontrado) { opAsignado = sEncontrado; clase += " op-alert"; }
                    else { opAsignado = "No Apto"; clase += " op-error"; }
                }

                html += `<tr><td class="carga-title"><b>${carga}</b></td><td><span class="${clase}">${opAsignado}</span></td></tr>`;
            });

            html += `</table>`;
            card.innerHTML = html;
            contenedor.appendChild(card);
        }
    }

    function guardarEnHistorial() {
        const contenedor = document.getElementById("contenedorJornada").innerHTML;
        if(!contenedor.trim()) return;

        let fecha = new Date().toLocaleString([], {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit'});
        historialJornadas.unshift({ fecha: fecha, html: contenedor });
        
        localStorage.setItem('registro_jornadas', JSON.stringify(historialJornadas));
        renderizarHistorial();
        alert("✅ ¡Jornada guardada con éxito en el Historial!");
    }

    function renderizarHistorial() {
        const lista = document.getElementById("contenedorHistorial");
        lista.innerHTML = "";
        
        if(historialJornadas.length === 0) {
            lista.innerHTML = "<p style='color:gray; font-size:0.9rem;'>No hay jornadas guardadas todavía.</p>";
            return;
        }

        historialJornadas.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "history-card";
            div.innerHTML = `
                <div class="history-header">
                    <span class="history-date">📅 Registro: ${item.fecha}</span>
                    <button class="btn-clear-hist" style="color:var(--danger);" onclick="eliminarRegistroIndividual(${index})">Eliminar</button>
                </div>
                <div class="jornada-grid">${item.html}</div>
            `;
            lista.appendChild(div);
        });
    }

    function eliminarRegistroIndividual(index) {
        historialJornadas.splice(index, 1);
        localStorage.setItem('registro_jornadas', JSON.stringify(historialJornadas));
        renderizarHistorial();
    }

    function borrarTodoElHistorial() {
        if(confirm("¿Seguro que quieres borrar todo el registro histórico?")) {
            historialJornadas = [];
            localStorage.removeItem('registro_jornadas');
            renderizarHistorial();
        }
    }
</script>

</body>
</html>
