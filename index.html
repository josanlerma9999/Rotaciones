<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Rotaciones - Polivalencia Inteligente</title>
    <style>
        :root { 
            --bg-main: #000000;       
            --bg-card: #111827;       
            --primary: #3b82f6;       
            --primary-light: #22d3ee; 
            --accent: #f59e0b;        
            --text-main: #ffffff;     
            --text-muted: #94a3b8;    
            --success: #10b981; 
            --danger: #f43f5e; 
            --border-color: #1f2937;
        }
        
        * { box-sizing: border-box; }
        html { font-size: 14px; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            padding: 12px; 
            margin: 0; 
            padding-bottom: 110px;
        }
        
        .container { max-width: 1200px; margin: auto; display: flex; flex-direction: column; min-height: calc(100vh - 100px); }
        
        /* Ajuste de iconos y menú */
        .tabs-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; display: flex; justify-content: space-around; padding: 10px 4px; border-top: 2px solid #222; z-index: 9999; }
        .tab-btn { flex: 1; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 700; }
        .tab-btn .icon { font-size: 1.6rem !important; }
        .tab-btn.active { color: var(--primary-light); }

        /* Estilos de turnos */
        .turno-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .turno-header { background: #050505; color: var(--accent); padding: 12px; text-align: center; font-weight: 800; font-size: 1rem; border-bottom: 1px solid var(--border-color); }
        
        .select-op-editable {
            background: #000; color: #fff; border: 2px solid #374151; padding: 8px; border-radius: 6px;
            width: 100%; font-weight: 700; cursor: pointer;
        }
        .op-alert { border-color: var(--accent) !important; color: var(--accent); }
        
        .btn-save-turno {
            background: #1e3a8a; color: #fff; border: none; padding: 14px; width: 100%; font-weight: 800; cursor: pointer;
            text-transform: uppercase; font-size: 0.85rem;
        }
        .btn-save-turno:hover { background: #1d4ed8; }

        .results-table { width: 100%; border-collapse: collapse; }
        .results-table td { padding: 12px; border-bottom: 1px solid #1f2937; }
        .carga-title { font-weight: 800; color: #fff; width: 40%; }
        
        /* Resto de estilos base igual que antes... */
    </style>
</head>
<body>

<div class="container">
    <div class="main-header"><h1>Rotaciones con Polivalencia</h1></div>
    
    <div id="tab-jornada" class="tab-content active">
        <div class="jornada-grid" id="contenedorJornada"></div>
    </div>
    
    <!-- (El resto de pestañas se mantienen iguales...) -->

    <div class="tabs-nav">
        <!-- Iconos grandes -->
        <button class="tab-btn" onclick="cambiarPestaña('tab-config', this)"><span class="icon">⚙️</span>Config</button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-matriz', this)"><span class="icon">🛠️</span>Polivalencia</button>
        <button class="tab-btn active" onclick="cambiarPestaña('tab-jornada', this)"><span class="icon">📅</span>Turnos</button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-contador', this)"><span class="icon">📊</span>Contador</button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-historial', this)"><span class="icon">📂</span>Historial</button>
    </div>
</div>

<script>
    // LÓGICA DE ASIGNACIÓN INTELIGENTE
    function generarJornadaCompleta() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedor = document.getElementById("contenedorJornada");
        contenedor.innerHTML = "";

        // Matriz para seguir a quién hemos asignado qué hoy (para no repetir)
        let ocupacionHoy = {}; 
        ops.forEach(o => ocupacionHoy[o] = new Set());

        for (let t = 1; t <= 4; t++) {
            matrizJornadaCalculada[t] = {};
            let operariosUsadosEnEsteTurno = new Set();

            // 1. Prioridad: Lo fijado manualmente por el usuario
            cargas.forEach(c => {
                let clave = `${t}_X_${c}`;
                if (cambiosManualesUsuarios[clave]) {
                    let op = cambiosManualesUsuarios[clave];
                    matrizJornadaCalculada[t][c] = { nombre: op, alerta: false };
                    operariosUsadosEnEsteTurno.add(op);
                    ocupacionHoy[op].add(c);
                }
            });

            // 2. Rellenar huecos buscando polivalencia
            cargas.forEach(c => {
                if (matrizJornadaCalculada[t][c]) return;

                let asignado = false;
                
                // Primero buscamos alguien que SEPA hacer esta carga y NO esté ocupado hoy
                for (let op of ops) {
                    if (!operariosUsadosEnEsteTurno.has(op) && 
                        !ocupacionHoy[op].has(c) && 
                        competencies[`${op}_X_${c}`] === true) {
                        
                        matrizJornadaCalculada[t][c] = { nombre: op, alerta: false };
                        operariosUsadosEnEsteTurno.add(op);
                        ocupacionHoy[op].add(c);
                        asignado = true;
                        break;
                    }
                }

                // Si no hay nadie polivalente libre, buscamos a cualquiera libre (con alerta)
                if (!asignado) {
                    for (let op of ops) {
                        if (!operariosUsadosEnEsteTurno.has(op) && !ocupacionHoy[op].has(c)) {
                            matrizJornadaCalculada[t][c] = { nombre: op, alerta: true }; // Alerta porque no es polivalente
                            operariosUsadosEnEsteTurno.add(op);
                            ocupacionHoy[op].add(c);
                            asignado = true;
                            break;
                        }
                    }
                }
            });

            // Dibujar tarjeta (igual que antes pero con la clase 'op-alert' si hay alerta)
            renderizarTarjetaTurno(t, cargas);
        }
    }

    function renderizarTarjetaTurno(t, cargas) {
        const contenedor = document.getElementById("contenedorJornada");
        const card = document.createElement("div");
        card.className = "turno-card";
        
        let html = `<div class="turno-header">TURNO ${t}</div><table class="results-table">`;
        
        cargas.forEach(c => {
            let res = matrizJornadaCalculada[t][c];
            let clase = res.alerta ? "op-alert" : "";
            html += `<tr>
                <td class="carga-title">${c}</td>
                <td>
                    <select class="select-op-editable ${clase}" onchange="cambiosManualesUsuarios['${t}_X_${c}']=this.value">
                        ${leerLista("listaOps").map(o => `<option value="${o}" ${o===res.nombre?'selected':''}>${o}</option>`).join('')}
                    </select>
                </td>
            </tr>`;
        });
        
        html += `</table><button class="btn-save-turno" onclick="guardarTurnoYRecalcularSiguientes(${t})">💾 Guardar T${t} y Recalcular</button>`;
        card.innerHTML = html;
        contenedor.appendChild(card);
    }

    // El resto de funciones (guardarTurnoYRecalcularSiguientes, etc) se mantienen...
</script>
</body>
</html>
