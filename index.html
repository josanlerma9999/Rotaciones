<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Rotaciones - Scroll Horizontal Fijo</title>
    <style>
        :root { 
            --bg-main: #000000;       
            --bg-card: #111827;       
            --primary: #3b82f6;       
            --primary-light: #22d3ee; 
            --accent: #f59e0b;        
            --text-main: #ffffff;     
            --text-muted: #94a3b8;    
            --success: #10b981; 
            --danger: #f43f5e; 
            --border-color: #1f2937;
        }
        
        * { box-sizing: border-box; }
        
                body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            padding: 12px; 
            margin: 0; 
            padding-bottom: 95px; /* <--- Este margen evita que el menú tape el contenido al bajar del todo */
            font-size: 0.9rem; 
        }

        
        .container { 
            max-width: 1200px; 
            margin: auto;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 100px);
        }
        
        .main-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 0 12px 0;
        }

        .main-header h1 {
            margin: 0;
            font-size: 1.05rem; 
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            line-height: 1.3;
            text-transform: uppercase;
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 5px;
            text-align: center;
            width: 100%;
            max-width: 85%;
        }

        .schedule-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .btn-schedule {
            background: #111827;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            flex: 1;
            max-width: 140px;
        }
        .btn-schedule.active-day {
            background: #1e3a8a;
            color: #60a5fa;
            border-color: #3b82f6;
        }
        .btn-schedule.active-afternoon {
            background: #2e1065;
            color: #c084fc;
            border-color: #a855f7;
        }

        .tabs-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; right: 0; 
            background: #0a0a0a; 
            display: flex; 
            justify-content: space-around;
            padding: 6px 4px; 
            border-top: 1px solid #222;
            z-index: 9999;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.6);
        }
        
        .tab-btn { 
            flex: 1; 
            border: none; 
            background: transparent; 
            color: var(--text-muted); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 2px; 
            font-size: 0.65rem; 
            font-weight: 600;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .tab-btn .icon { font-size: 1.15rem; } 
        .tab-btn.active { color: var(--primary-light); transform: scale(1.05); }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; flex-grow: 1; }

        /* ✨ SCROLL HORIZONTAL OPTIMIZADO (IZQUIERDA/DERECHA) ✨ */
        .config-grid { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            overflow-y: hidden; /* Prohíbe el desborde vertical de la cuadrícula */
            scroll-behavior: smooth; 
            scroll-snap-type: x mandatory;
            padding: 5px 5px 15px 5px;
            -webkit-overflow-scrolling: touch;
            flex-grow: 1;
            touch-action: pan-x; /* 🔒 CLAVE: Bloquea el movimiento vertical del móvil al deslizar de lado */
        }
        .config-grid::-webkit-scrollbar { display: none; }

        .section-box { 
            background: var(--bg-card); border-radius: 12px; padding: 14px; border: 1px solid var(--border-color);
            flex: 0 0 calc(100% - 10px); scroll-snap-align: center;   
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
        }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-title { font-weight: 800; color: var(--primary-light); font-size: 0.95rem; }
        .btn-add { background: #1e3a8a; color: #60a5fa; border: 1px solid #3b82f6; padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .item-list { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            flex-grow: 1;
            overflow-y: auto; 
            max-height: calc(100vh - 270px); 
            padding-right: 4px; 
        }
        .item-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        
        #listaOps .item-input { flex: 1; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.9rem; background: #000; color: var(--primary-light); font-weight: 700; }
        #listaCargas .item-input { flex: 1; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.9rem; background: #000; color: #fff; font-weight: 800; }
        .item-input:focus { border-color: var(--primary-light); outline: none; }
        
        .btn-del { background: #2a1f08; color: var(--accent); border: 1px solid #78350f; padding: 0; border-radius: 50%; cursor: pointer; font-weight: bold; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }

                /* ==========================================================================
           📋 REDISEÑO COMPLETO DE TABLAS (POLIVALENCIA Y CONTADORES)
           ========================================================================== */
        
        .matrix-container { 
            overflow-x: auto; 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .matrix-table { 
            width: max-content; /* Fuerza a la tabla a expandirse horizontalmente todo lo que necesite */
            min-width: 100%;
            border-collapse: collapse; 
            table-layout: fixed; /* Cuadra todas las columnas con medidas exactas */
        }
        
        /* 🏷️ Cabeceras de las cargas (Nombres arriba) */
        .matrix-table th { 
            background: #111827; 
            color: var(--text-muted); 
            font-size: 0.8rem; /* Letra más grande y legible */
            padding: 14px 10px; 
            border: 1px solid var(--border-color); 
            font-weight: 800; 
            text-transform: uppercase; 
            text-align: center;
            white-space: nowrap; /* Mantiene el nombre en una sola línea hacia la derecha */
            
            /* ✨ Ancho idéntico y equilibrado para todas las columnas de carga */
            width: 160px; 
            min-width: 160px;
        }
        
        /* 👥 Primera columna fija: Nombres de los Operarios */
        .matrix-table th:first-child,
        .matrix-table td:first-child {
            width: 120px;
            min-width: 120px;
            text-align: left; 
            font-weight: 700; 
            background: #050505; 
            color: var(--primary-light); 
            position: sticky; 
            left: 0; 
            z-index: 10; /* Se mantiene por encima al deslizar */
            border-right: 2px solid var(--border-color);
            padding-left: 12px;
        }

        /* 🔢 Celdas de contenido (Checks y Números de contadores) */
        .matrix-table td { 
            padding: 14px 8px; 
            text-align: center; /* Alinea perfectamente al centro tanto los números como los checkbox */
            vertical-align: middle;
            border: 1px solid var(--border-color); 
            font-size: 0.95rem; /* Aumentado para ver los contadores con claridad */
            color: #ffffff;
            white-space: nowrap;
        }
        
        /* 📊 Estilo mejorado para los números del Contador */
        .count-number { 
            font-weight: 900; 
            color: var(--accent); 
            font-size: 1.1rem; /* Resalta el número en el centro de su tarjeta */
            display: block;
            text-align: center;
            width: 100%;
        }

                /* ==========================================================================
           📋 REDISEÑO DEFINITIVO Y BLINDADO DE TABLAS
           ========================================================================== */
        
        .matrix-container { 
            overflow-x: auto; 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 12px;
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }

        .matrix-table { 
            width: max-content; 
            min-width: 100%;
            border-collapse: collapse; 
            table-layout: fixed; /* Volvemos a fixed pero controlando estrictamente los anchos de todo */
        }

        /* Fuerza a que cada fila mantenga su estructura horizontal */
        .matrix-table tr {
            height: 54px !important;
            max-height: 54px !important;
        }
        
        /* 🏷️ Cabeceras (Nombres de las cargas arriba) */
        .matrix-table th { 
            background: #111827; 
            color: var(--text-muted); 
            font-size: 0.8rem; 
            padding: 0 12px; 
            height: 54px;
            border: 1px solid var(--border-color); 
            font-weight: 800; 
            text-transform: uppercase; 
            text-align: center;
            white-space: nowrap; 
            width: 160px !important; 
            min-width: 160px !important;
            max-width: 160px !important;
            box-sizing: border-box;
        }
        
        /* 👥 CORRECCIÓN CLAVE: Primera columna fija de Operarios (Bloqueada para que no estire) */
        .matrix-table th:first-child,
        .matrix-table td:first-child {
            width: 120px !important;
            min-width: 120px !important;
            max-width: 120px !important;
            height: 54px !important;
            max-height: 54px !important;
            text-align: left; 
            font-weight: 700; 
            background: #050505 !important; 
            color: var(--primary-light); 
            position: sticky; 
            left: 0; 
            z-index: 10; 
            border-right: 2px solid var(--border-color);
            padding-left: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: table-cell; /* Evita que se comporte como bloque flexible y se estire */
            vertical-align: middle;
        }

        /* 🔢 Celdas de contenido (Números y Checkboxes) */
        .matrix-table td { 
            padding: 0 8px; 
            text-align: center; 
            border: 1px solid var(--border-color); 
            font-size: 1rem; 
            color: #ffffff;
            white-space: nowrap;
            box-sizing: border-box;
            height: 54px !important;
            max-height: 54px !important;
            width: 160px;
            min-width: 160px;
            max-width: 160px;
            display: table-cell;
            vertical-align: middle;
        }
        
        /* 📊 Estilo para los números del Contador */
        .count-number { 
            font-weight: 900; 
            color: var(--accent); 
            font-size: 1.1rem; 
            text-align: center;
            display: inline-block;
            width: 100%;
        }

        /* ☑️ Cuadrados de Selección (Checkboxes) */
        .matrix-table input[type="checkbox"] { 
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-color: #1f2937; 
            margin: 0 auto !important; 
            display: block;
            width: 24px;  
            height: 24px; 
            min-width: 24px; 
            min-height: 24px;
            max-width: 24px;
            max-height: 24px;
            border: 2px solid var(--border-color); 
            border-radius: 6px; 
            cursor: pointer;
            position: relative;
            box-sizing: border-box;
            transition: background-color 0.2s ease;
        }

        .matrix-table input[type="checkbox"]:checked {
            background-color: var(--primary-light); 
            border-color: var(--primary-light);
        }

        .matrix-table input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 2px;
            width: 5px;
            height: 11px;
            border: solid #000000; 
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }



        
        .matrix-table input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary-light); }
        .count-number { font-weight: 800; color: var(--accent); font-size: 0.95rem; }

        /* 📱 SECCIÓN DE TURNOS (CON SCROLL LATERAL) */
        .action-bar { display: flex; gap: 8px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .btn-main { border: none; padding: 10px 16px; font-size: 0.85rem; border-radius: 8px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .btn-primary { background: #1e3a8a; color: #60a5fa; border: 1px solid #3b82f6; }
        .btn-secondary { background: #334155; color: white; }
        .btn-success { background: #065f46; color: #34d399; border: 1px solid #059669; }

        /* 📱 CORRECCIÓN DE SCROLL EN SECCIÓN DE TURNOS */
.jornada-grid { 
    display: flex; 
    flex-direction: column; /* Cambiado a columna para apilar hacia abajo */
    gap: 12px; 
    overflow-y: auto;       /* Permitir scroll vertical */
    overflow-x: hidden;     /* Bloquear scroll horizontal innecesario */
    padding: 5px 5px 80px 5px; /* Padding extra abajo para no tapar el menú */
    max-height: calc(100vh - 200px); /* Límite para que el scroll funcione dentro de la pantalla */
    -webkit-overflow-scrolling: touch;
}

.turno-card { 
    background: var(--bg-card); 
    border: 1px solid var(--border-color); 
    border-radius: 12px; 
    overflow: hidden; 
    flex: 0 0 auto; /* Permite que la tarjeta tenga su altura natural */
    width: 100%;    /* Asegura que ocupe el ancho disponible */
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* Ajuste para pantallas grandes (Escritorio) */
@media (min-width: 900px) {
    .jornada-grid { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); 
        overflow-y: visible;
        max-height: none;
    }
}

        .turno-header { background: #050505; color: var(--accent); padding: 10px; text-align: center; font-weight: 800; font-size: 0.95rem; border-bottom: 1px solid var(--border-color); letter-spacing: 0.5px; }
        .turno-header span { color: #ffffff; display: block; font-size: 0.75rem; margin-top: 2px; font-weight: 600; opacity: 0.8; }
        
        .results-table { width: 100%; border-collapse: collapse; }
        .results-table td { padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; }
        
        .carga-title { font-weight: 800; color: #ffffff; font-size: 0.9rem; letter-spacing: -0.3px; }
        
        .select-op-editable {
            background: transparent; color: var(--primary-light); border: none; font-weight: 800; font-size: 0.9rem;
            width: 100%; cursor: pointer; outline: none; font-family: inherit; text-transform: uppercase;
            -webkit-appearance: none; appearance: none;
        }
        .select-op-editable option { background: #111827; color: #fff; }
        .select-op-editable.op-alert { color: var(--accent); }
        .select-op-editable.op-error { color: var(--danger); }

        /* 👑 CABECERA EN FILA ÚNICA IMPEDIBLE 👑 */
        .history-header { 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 15px; 
            gap: 10px; 
            width: 100%;
        }
        .history-header .section-title {
            font-size: 0.88rem; 
            white-space: nowrap; 
            font-weight: 800;
        }
        .btn-counter-reset {
            background: #2a1f08; 
            color: var(--accent); 
            border: 1px solid #78350f; 
            padding: 6px 10px; 
            font-size: 0.78rem; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            white-space: nowrap;
            flex-shrink: 0; 
        }

        .btn-clear-hist { background: #271c1c; color: var(--danger); border: 1px solid #7f1d1d; padding: 6px 12px; font-size: 0.75rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .history-list { display: flex; flex-direction: column; gap: 15px; max-height: 70vh; overflow-y: auto; }
        .history-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; }
        .history-item-title { font-weight: 800; color: var(--accent); margin-bottom: 8px; font-size: 0.85rem; border-bottom: 1px solid #1f2937; padding-bottom: 4px; display: flex; justify-content: space-between; }
        .history-item-content { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; font-size: 0.8rem; }
        @media (min-width: 600px) { .history-item-content { grid-template-columns: repeat(4, 1fr); } }
        .history-turno-block { background: #000; padding: 6px; border-radius: 6px; border: 1px solid #1f2937; }
        .history-turno-title { font-weight: 800; color: var(--primary-light); font-size: 0.75rem; margin-bottom: 4px; }
        .history-linea { font-size: 0.75rem; color: #ccc; margin-bottom: 2px; }
        .history-linea strong { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        <h1>Control de Rotaciones</h1>
    </div>

    <!-- Pestaña Configuración (VUELVE AL SCROLL LATERAL PERFECTO) -->
    <div id="tab-config" class="tab-content active">
        <div class="config-grid" id="contenedorConfig">
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">👷 Operarios en turno</span>
                    <button class="btn-add" onclick="agregarFila('listaOps', 'Operario')">+ Añadir</button>
                </div>
                <div id="listaOps" class="item-list"></div>
            </div>
            <div class="section-box">
                <div class="section-header">
                    <span class="section-title">📦 Cargas de Trabajo</span>
                    <button class="btn-add" onclick="agregarFila('listaCargas', 'Carga')">+ Añadir</button>
                </div>
                <div id="listaCargas" class="item-list"></div>
            </div>
        </div>
    </div>

    <!-- Pestaña Polivalencia -->
    <div id="tab-matriz" class="tab-content">
        <div class="matrix-container" id="contenedorMatriz"></div>
    </div>

    <!-- Pestaña Turnos -->
    <div id="tab-jornada" class="tab-content">
        <div class="schedule-selector">
            <button id="btnHorarioManana" class="btn-schedule active-day" onclick="seleccionarTipoHorario('manana')">☀️ Mañana</button>
            <button id="btnHorarioTarde" class="btn-schedule" onclick="seleccionarTipoHorario('tarde')">🌙 Tarde</button>
        </div>

        <div class="jornada-grid" id="contenedorJornada"></div>

        <div class="action-bar">
            <button class="btn-main btn-primary" onclick="cambiarCombinacion()">🔄 Combinación</button>
            <button class="btn-main btn-success" onclick="guardarEnHistorial()">💾 Guardar Hoy</button>
            <button class="btn-main btn-secondary" onclick="window.print()">🖨️ Imprimir</button>
        </div>
    </div>

    <!-- Pestaña Contador Semanal -->
    <div id="tab-contador" class="tab-content">
        <div class="history-header">
            <span class="section-title">📊 Veces por Puesto</span>
            <button class="btn-counter-reset" onclick="reiniciarContadoresSemanales()">🔄 Nueva Semana</button>
        </div>
        <div class="matrix-container" id="contenedorContador"></div>
    </div>

    <!-- Pestaña Historial Guardado -->
    <div id="tab-historial" class="tab-content">
        <div class="history-header">
            <span class="section-title">📂 Historial de Jornadas</span>
            <button class="btn-clear-hist" onclick="borrarTodoElHistorial()">🗑️ Vaciar Todo</button>
        </div>
        <div id="contenedorHistorial" class="history-list"></div>
    </div>

    <!-- Navegación Inferior -->
    <div class="tabs-nav">
        <button class="tab-btn active" onclick="cambiarPestaña('tab-config', this)">
            <span class="icon">⚙️</span>
            <span>Configurar</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-matriz', this)">
            <span class="icon">🛠️</span>
            <span>Polivalencia</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-jornada', this)">
            <span class="icon">📅</span>
            <span>Turnos</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-contador', this)">
            <span class="icon">📊</span>
            <span>Contador</span>
        </button>
        <button class="tab-btn" onclick="cambiarPestaña('tab-historial', this)">
            <span class="icon">📂</span>
            <span>Historial</span>
        </button>
    </div>
</div>

<script>
    let saltoInicialJornada = 0;
    let competencies = {};
    let historialJornadas = [];
    let conteoSemanal = {}; 
    let tipoHorarioSeleccionado = "manana"; 
    let cambiosManualesUsuarios = {}; 

    const horasMañana = ["05:45 - 08:00", "08:00 - 10:20", "10:20 - 12:00", "12:00 - 14:00"];
    const horasTarde = ["13:45 - 16:20", "16:20 - 18:00", "18:00 - 20:00", "20:00 - 22:00"];

    const defaultOps = ["Óscar", "Manuel", "Sara", "Cesar", "Cristian", "Mario", "Nara", "Operario 8"];
    const defaultCargas = ["Carga 1", "Carga 2", "Carga 3", "Carga 4"];

    window.onload = function() {
        if(localStorage.getItem('hist_competencias_v14')) {
            try { competencies = JSON.parse(localStorage.getItem('hist_competencias_v14')); } catch(e) {}
        }
        if(localStorage.getItem('registro_jornadas_v14')) {
            try { historialJornadas = JSON.parse(localStorage.getItem('registro_jornadas_v14')); } catch(e) {}
        }
        if(localStorage.getItem('conteo_semanal_v14')) {
            try { conteoSemanal = JSON.parse(localStorage.getItem('conteo_semanal_v14')); } catch(e) {}
        }
        if(localStorage.getItem('tipo_horario_v14')) {
            tipoHorarioSeleccionado = localStorage.getItem('tipo_horario_v14');
        }

        let ops = localStorage.getItem('hist_ops_v14') ? JSON.parse(localStorage.getItem('hist_ops_v14')) : defaultOps;
        let cargas = localStorage.getItem('hist_cargas_v14') ? JSON.parse(localStorage.getItem('hist_cargas_v14')) : defaultCargas;

        ops.forEach(v => agregarFila('listaOps', 'Operario', v));
        cargas.forEach(v => agregarFila('listaCargas', 'Carga', v));

        actualizarVisualBotonesHorario();
        procesarCambios();
    };

    function cambiarPestaña(tabId, boton) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        boton.classList.add('active');
        if(tabId === 'tab-historial') renderizarHistorial();
    }

    function seleccionarTipoHorario(tipo) {
        tipoHorarioSeleccionado = tipo;
        localStorage.setItem('tipo_horario_v14', tipo);
        cambiosManualesUsuarios = {}; 
        actualizarVisualBotonesHorario();
        generarJornadaCompleta();
    }

    function actualizarVisualBotonesHorario() {
        const btnM = document.getElementById("btnHorarioManana");
        const btnT = document.getElementById("btnHorarioTarde");
        btnM.className = "btn-schedule";
        btnT.className = "btn-schedule";
        if(tipoHorarioSeleccionado === "manana") btnM.classList.add("active-day");
        else btnT.classList.add("active-afternoon");
    }

    function agregarFila(contenedorId, tipo, valor = "") {
        const contenedor = document.getElementById(contenedorId);
        const row = document.createElement("div");
        row.className = "item-row";
        row.innerHTML = `
            <input type="text" class="item-input" value="${valor}" placeholder="Escribir..." oninput="procesarCambios()">
            <button class="btn-del" onclick="this.parentElement.remove(); procesarCambios();">🗑️</button>
        `;
        contenedor.appendChild(row);
    }

    function leerLista(contenedorId) {
        return Array.from(document.querySelectorAll(`#${contenedorId} .item-input`))
            .map(i => i.value.trim())
            .filter(v => v);
    }

    function procesarCambios() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedorMatriz = document.getElementById("contenedorMatriz");

        localStorage.setItem('hist_ops_v14', JSON.stringify(ops));
        localStorage.setItem('hist_cargas_v14', JSON.stringify(cargas));

        if(ops.length === 0 || cargas.length === 0) return;

        let html = `<table class="matrix-table"><thead><tr><th>Operario</th>`;
        cargas.forEach(c => html += `<th>${c}</th>`);
        html += `</tr></thead><tbody>`;

        ops.forEach(op => {
            html += `<tr><td>${op}</td>`;
            cargas.forEach(c => {
                let clv = `${op}_X_${c}`;
                let check = (competencies[clv] !== false) ? "checked" : "";
                html += `<td><input type="checkbox" data-clave="${clv}" ${check} onchange="competencies[this.dataset.clave]=this.checked; localStorage.setItem('hist_competencias_v14', JSON.stringify(competencies)); generarJornadaCompleta();"></td>`;
            });
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        contenedorMatriz.innerHTML = html;

        cambiosManualesUsuarios = {}; 
        generarJornadaCompleta();
        renderizarTablaContadores();
    }

    function cambiarCombinacion() {
        saltoInicialJornada++;
        cambiosManualesUsuarios = {}; 
        generarJornadaCompleta();
    }

    let matrizJornadaCalculada = {};

    function generarJornadaCompleta() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedor = document.getElementById("contenedorJornada");
        contenedor.innerHTML = "";

        if(ops.length === 0 || cargas.length === 0) return;
        const horasActivas = (tipoHorarioSeleccionado === "manana") ? horasMañana : horasTarde;

        matrizJornadaCalculada = {};
        let historialPuestosPorOperarioDia = {}; 
        ops.forEach(o => historialPuestosPorOperarioDia[o] = new Set());

        for (let t = 1; t <= 4; t++) {
            let desplazo = saltoInicialJornada + (t - 1);
            matrizJornadaCalculada[t] = {};
            
            let operariosOcupadosEnEsteTurnoMismo = new Set();
            cargas.forEach(carga => {
                let claveManual = `${t}_X_${carga}`;
                if (cambiosManualesUsuarios[claveManual]) {
                    let opManual = cambiosManualesUsuarios[claveManual];
                    if (opManual !== "No Apto") {
                        operariosOcupadosEnEsteTurnoMismo.add(opManual); 
                        historialPuestosPorOperarioDia[opManual].add(carga);
                    }
                }
            });

            cargas.forEach(carga => {
                let claveManual = `${t}_X_${carga}`;
                if (cambiosManualesUsuarios[claveManual]) {
                    let opManual = cambiosManualesUsuarios[claveManual];
                    matrizJornadaCalculada[t][carga] = { 
                        nombre: opManual, 
                        alerta: (opManual !== "No Apto" && competencies[`${opManual}_X_${carga}`] === false)
                    };
                }
            });

            cargas.forEach((carga, i) => {
                if (matrizJornadaCalculada[t][carga]) return; 

                let idxBase = (i + desplazo) % ops.length;
                let asignado = false;

                for (let s = 0; s < ops.length; s++) {
                    let candidato = ops[(idxBase + s) % ops.length];
                    let yaHizoEstaFaenaHoy = historialPuestosPorOperarioDia[candidato].has(carga);

                    if (!operariosOcupadosEnEsteTurnoMismo.has(candidato) && 
                        !yaHizoEstaFaenaHoy && 
                        competencies[`${candidato}_X_${carga}`] !== false) {
                        
                        matrizJornadaCalculada[t][carga] = { nombre: candidato, alerta: false };
                        operariosOcupadosEnEsteTurnoMismo.add(candidato);
                        historialPuestosPorOperarioDia[candidato].add(carga);
                        asignado = true;
                        break;
                    }
                }

                if (!asignado) {
                    for (let s = 0; s < ops.length; s++) {
                        let candidato = ops[(idxBase + s) % ops.length];
                        let yaHizoEstaFaenaHoy = historialPuestosPorOperarioDia[candidato].has(carga);

                        if (!operariosOcupadosEnEsteTurnoMismo.has(candidato) && !yaHizoEstaFaenaHoy) {
                            matrizJornadaCalculada[t][carga] = { nombre: candidato, alerta: true };
                            operariosOcupadosEnEsteTurnoMismo.add(candidato);
                            historialPuestosPorOperarioDia[candidato].add(carga);
                            asignado = true;
                            break;
                        }
                    }
                }

                if (!asignado) {
                    for (let s = 0; s < ops.length; s++) {
                        let candidato = ops[(idxBase + s) % ops.length];
                        if (!operariosOcupadosEnEsteTurnoMismo.has(candidato)) {
                            matrizJornadaCalculada[t][carga] = { nombre: candidato, alerta: true };
                            operariosOcupadosEnEsteTurnoMismo.add(candidato);
                            asignado = true;
                            break;
                        }
                    }
                }

                if (!asignado) {
                    matrizJornadaCalculada[t][carga] = { nombre: "No Apto", error: true };
                }
            });
        }

        for (let t = 1; t <= 4; t++) {
            const card = document.createElement("div");
            card.className = "turno-card";
            let html = `<div class="turno-header">TURNO ${t} <span>⏱️ ${horasActivas[t-1]}</span></div><table class="results-table">`;

            cargas.forEach(carga => {
                let res = matrizJornadaCalculada[t][carga];
                let claseExtra = res.alerta ? "op-alert" : res.error ? "op-error" : "";

                html += `<tr>
                    <td class="carga-title">${carga}</td>
                    <td>
                        <select class="select-op-editable ${claseExtra}" data-turno="${t}" data-carga="${carga}" onchange="registrarCambioManualYRecalcular(this)">
                            ${ops.map(o => `<option value="${o}" ${o === res.nombre ? 'selected' : ''}>${o}</option>`).join('')}
                            <option value="No Apto" ${res.nombre === 'No Apto' ? 'selected' : ''}>⚠️ No Apto</option>
                        </select>
                    </td>
                </tr>`;
            });

            html += `</table>`;
            card.innerHTML = html;
            contenedor.appendChild(card);
        }
    }

    function registrarCambioManualYRecalcular(select) {
        let turnoActual = parseInt(select.dataset.turno);
        let cargaDondeEntra = select.dataset.carga;
        let operarioQueEntra = select.value;

        let operarioQueEstabaAntes = "No Apto";
        if (matrizJornadaCalculada[turnoActual] && matrizJornadaCalculada[turnoActual][cargaDondeEntra]) {
            operarioQueEstabaAntes = matrizJornadaCalculada[turnoActual][cargaDondeEntra].nombre;
        }

        let cargaDondeEstabaElQueEntra = null;
        if (operarioQueEntra !== "No Apto") {
            const cargasEnTurno = leerLista("listaCargas");
            for (let c of cargasEnTurno) {
                if (matrizJornadaCalculada[turnoActual] && matrizJornadaCalculada[turnoActual][c]) {
                    if (matrizJornadaCalculada[turnoActual][c].nombre === operarioQueEntra) {
                        cargaDondeEstabaElQueEntra = c;
                        break;
                    }
                }
            }
        }

        if (cargaDondeEstabaElQueEntra && cargaDondeEstabaElQueEntra !== cargaDondeEntra) {
            cambiosManualesUsuarios[`${turnoActual}_X_${cargaDondeEstabaElQueEntra}`] = operarioQueEstabaAntes;
        }

        cambiosManualesUsuarios[`${turnoActual}_X_${cargaDondeEntra}`] = operarioQueEntra;

        const cargasEnTurno = leerLista("listaCargas");
        for (let t = turnoActual + 1; t <= 4; t++) {
            cargasEnTurno.forEach(c => {
                delete cambiosManualesUsuarios[`${t}_X_${c}`];
            });
        }

        generarJornadaCompleta();
    }

    function renderizarTablaContadores() {
        const ops = leerLista("listaOps");
        const cargas = leerLista("listaCargas");
        const contenedor = document.getElementById("contenedorContador");
        if(ops.length === 0 || cargas.length === 0) return;

        let html = `<table class="matrix-table"><thead><tr><th>Operario</th>`;
        cargas.forEach(c => html += `<th>${c}</th>`);
        html += `</tr></thead><tbody>`;

        ops.forEach(op => {
            html += `<tr><td>${op}</td>`;
            cargas.forEach(c => {
                let clv = `${op}_X_${c}`;
                let total = conteoSemanal[clv] || 0;
                html += `<td class="count-number">${total}</td>`;
            });
            html += `</tr>`;
        });
        html += `</tbody></table>`;
        contenedor.innerHTML = html;
    }

    function guardarEnHistorial() {
        const selectores = document.querySelectorAll(".select-op-editable");
        if(selectores.length === 0) return;

        selectores.forEach(select => {
            let opAsignado = select.value;
            let carga = select.dataset.carga;
            if(opAsignado !== "No Apto") {
                let clv = `${opAsignado}_X_${carga}`;
                if(!conteoSemanal[clv]) conteoSemanal[clv] = 0;
                conteoSemanal[clv]++;
            }
        });
        localStorage.setItem('conteo_semanal_v14', JSON.stringify(conteoSemanal));
        renderizarTablaContadores();

        let copiaTurnos = {};
        for(let t=1; t<=4; t++) {
            copiaTurnos[t] = {};
            for(let c in matrizJornadaCalculada[t]) {
                copiaTurnos[t][c] = matrizJornadaCalculada[t][c].nombre;
            }
        }

        let fechaActual = new Date();
        let nuevaJornada = {
            id: Date.now(),
            fecha: fechaActual.toLocaleDateString("es-ES"),
            hora: fechaActual.toLocaleTimeString("es-ES", {hour: '2-digit', minute:'2-digit'}),
            tipoHorario: tipoHorarioSeleccionado === "manana" ? "☀️ Mañana" : "🌙 Tarde",
            datos: copiaTurnos
        };

        historialJornadas.unshift(nuevaJornada);
        localStorage.setItem('registro_jornadas_v14', JSON.stringify(historialJornadas));
        
        alert("💾 ¡Guardado con éxito en contadores e Historial!");
    }

    function renderizarHistorial() {
        const contenedor = document.getElementById("contenedorHistorial");
        contenedor.innerHTML = "";

        if(historialJornadas.length === 0) {
            contenedor.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:20px; font-size:0.85rem;">No hay jornadas guardadas todavía.</div>`;
            return;
        }

        historialJornadas.forEach(jornada => {
            const item = document.createElement("div");
            item.className = "history-item";
            
            let htmlTitle = `<div class="history-item-title">
                <span>📅 ${jornada.fecha} (${jornada.hora}) - ${jornada.tipoHorario}</span>
                <button style="background:transparent; border:none; color:var(--danger); font-weight:bold; cursor:pointer;" onclick="borrarJornadaIndividual(${jornada.id})">❌</button>
            </div>`;
            
            let htmlContent = `<div class="history-item-content">`;
            const horasActivas = (jornada.tipoHorario.includes("Mañana")) ? horasMañana : horasTarde;

            for(let t=1; t<=4; t++) {
                htmlContent += `<div class="history-turno-block">
                    <div class="history-turno-title">TURNO ${t}</div>`;
                
                if(jornada.datos && jornada.datos[t]) {
                    for(let carga in jornada.datos[t]) {
                        htmlContent += `<div class="history-linea">${carga}: <strong>${jornada.datos[t][carga]}</strong></div>`;
                    }
                }
                htmlContent += `</div>`;
            }
            htmlContent += `</div>`;
            
            item.innerHTML = htmlTitle + htmlContent;
            contenedor.appendChild(item);
        });
    }

    function borrarJornadaIndividual(id) {
        if(confirm("¿Seguro que quieres borrar este registro del historial?")) {
            historialJornadas = historialJornadas.filter(j => j.id !== id);
            localStorage.setItem('registro_jornadas_v14', JSON.stringify(historialJornadas));
            renderizarHistorial();
        }
    }

    function borrarTodoElHistorial() {
        if(confirm("¿Seguro que quieres vaciar todo el historial de jornadas? (Los contadores semanales no se borrarán)")) {
            historialJornadas = [];
            localStorage.removeItem('registro_jornadas_v14');
            renderizarHistorial();
        }
    }

    function reiniciarContadoresSemanales() {
        if(confirm("¿Reiniciar la semana? Se pondrán a cero todas las estadísticas numéricas.")) {
            conteoSemanal = {};
            localStorage.removeItem('conteo_semanal_v14');
            renderizarTablaContadores();
        }
    }
</script>
